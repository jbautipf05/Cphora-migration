function onQuoteProductChange(sel) {
  const opt = sel.options[sel.selectedIndex]; const price = +opt.dataset.price||0;
  const row = sel.closest('.grid');
  row.querySelector('input[name="item_price[]"]').value = price;
  const desc = row.querySelector('input[name="item_desc[]"]');
  if (!desc.value) desc.value = opt.dataset.name||'';
  recalcQuote();
}
function recalcQuote() {
  const qtys = $$('input[name="item_qty[]"]').map(i=>+i.value||0);
  const prices = $$('input[name="item_price[]"]').map(i=>+i.value||0);
  const sub = qtys.reduce((a,q,i)=>a+q*prices[i],0);
  const d = +$('#qf-disc').value||0;
  const da = Math.round(sub*d/100);
  $('#qf-sub').textContent = fmtCOP(sub);
  $('#qf-disc-amt').textContent = '-'+fmtCOP(da);
  $('#qf-total').textContent = fmtCOP(sub-da);
}
function validateDiscount(inp) {
  const v = +inp.value||0; const msg = $('#qf-disc-msg');
  if (v<=20) msg.innerHTML = '<span class="text-emerald-400">✓ Pre-aprobado (vendedor)</span>';
  else if (v<=50) msg.innerHTML = '<span class="text-amber-400">⚠ Requiere aprobación gerencia</span>';
  else msg.innerHTML = '<span class="text-red-400">✗ No permitido (>50%)</span>';
  recalcQuote();
}
function validateVigencia(sel) {
  const v = +sel.value||30; const msg = $('#qf-vig-msg');
  if (!msg) return;
  if (v===20) msg.innerHTML = '<span class="text-amber-400">⚠ Vigencia 20 días: requiere aprobación de gerencia</span>';
  else msg.innerHTML = '';
}
function saveQuote(form) {
  const fd = new FormData(form);
  const products = fd.getAll('item_product[]'); const descs = fd.getAll('item_desc[]');
  const qtys = fd.getAll('item_qty[]').map(n=>+n); const prices = fd.getAll('item_price[]').map(n=>+n);
  const items = [];
  for (let i=0;i<products.length;i++) if (qtys[i]>0 && prices[i]>0) items.push({ productId:products[i]||null, desc:descs[i]||'', qty:qtys[i], price:prices[i] });
  if (!items.length) { toast('Agrega al menos un item válido','error'); return; }
  const discount = +fd.get('discount')||0;
  if (discount>50) { toast('Descuento >50% no permitido','error'); return; }
  const channel = fd.get('channel')||'Llamada';
  const vigDias = +fd.get('vigenciaDias')||30;
  let leadId = fd.get('leadId')||null;
  if (!leadId && fd.get('clientName')) {
    state.counters.lead++;
    const newLead = {
      id:'L-'+state.counters.lead,
      name: fd.get('clientName'),
      tipo:'lead',
      company:'—',
      phone: fd.get('newLeadPhone')||'',
      email: fd.get('newLeadEmail')||'',
      doc: fd.get('newLeadDoc')||'',
      address: fd.get('newLeadAddress')||'',
      city: fd.get('city')||'',
      channel,
      clasificacion:'medio',
      estado:'En gestión',
      asesor: fd.get('asesor'),
      valor: 0,
      productosInteres:[],
      createdAt: today(),
      notes: [{at:new Date().toISOString(), by:fd.get('asesor'), text:'Lead creado desde cotización.'}],
      seguimientos:[]
    };
    state.leads.unshift(newLead);
    leadId = newLead.id;
    toast('Lead '+newLead.id+' creado','ok');
  }
  state.counters.cot++;
  const requiresApproval = discount>20 || vigDias===20;
  const q = { id:'COT-'+state.counters.cot, leadId, clientName:fd.get('clientName'), city:fd.get('city')||'', channel, items, discount, notes:fd.get('notes')||'', asesor:fd.get('asesor'), estado:requiresApproval?'pendiente_aprob':'borrador', requiresApproval, approvalReason: requiresApproval?(vigDias===20?'Vigencia 20 días':'')+ (discount>20?(vigDias===20?' + ':'')+`Descuento ${discount}%`:''):'', createdAt:today(), vigenciaDias:vigDias, vigencia:addDays(today(), vigDias), seguimientos: generateQuoteSeguimientos(today()), notasSeguimiento:[] };
  state.quotes.unshift(q);
  if (q.leadId) { const l=state.leads.find(x=>x.id===q.leadId); if (l && l.estado!=='Compro') l.estado='En gestión'; }
  if (requiresApproval) pushNotification({ type:'warning', text:`Cotización ${q.id} requiere aprobación de gerencia (${q.approvalReason})`, targetUser:'Alexander Vivas', link:'cotizaciones', key:'cotAprob-'+q.id });
  save(); closeModal('modal-quote'); renderAll();
  toast(requiresApproval ? `Cotización ${q.id} creada · ⚠ Requiere aprobación de gerencia (${q.approvalReason})` : 'Cotización creada con 7 seguimientos programados', requiresApproval?'warn':'ok');
  openQuoteDetail(q.id);
}

function generateQuoteSeguimientos(baseDate) {
  const offsets = [3, 7, 14, 21, 35, 45, 60];
  return offsets.map((d,i)=>({ id:uid('QS'), n:i+1, fechaProxima:addDays(baseDate,d), estado:'pendiente', notas:'', completadoAt:null }));
}

function saveQuoteEdit(quoteId, form) {
  const q = state.quotes.find(x=>x.id===quoteId); if (!q) return;
  const fd = new FormData(form);
  const products = fd.getAll('item_product[]'); const descs = fd.getAll('item_desc[]');
  const qtys = fd.getAll('item_qty[]').map(n=>+n); const prices = fd.getAll('item_price[]').map(n=>+n);
  const items = [];
  for (let i=0;i<products.length;i++) if (qtys[i]>0 && prices[i]>0) items.push({ productId:products[i]||null, desc:descs[i]||'', qty:qtys[i], price:prices[i] });
  if (!items.length) { toast('Agrega al menos un producto','error'); return; }
  q.items = items;
  save(); openQuoteDetail(quoteId); toast('Cotización actualizada','ok');
}

function filterQuoteEditProducts(text) {
  const q = (text||'').toLowerCase();
  document.querySelectorAll('.qe-prod-select').forEach(sel => {
    let matched = null;
    [...sel.options].forEach(opt => {
      const nm = opt.dataset.name || opt.textContent.toLowerCase();
      opt.hidden = !!q && !nm.includes(q);
      if (!opt.hidden && !matched) matched = opt;
    });
    if (q && matched && sel.selectedOptions[0]?.hidden) { sel.value = matched.value; onQuoteEditProductChange(sel); }
  });
}

function onQuoteEditProductChange(sel) {
  const opt = sel.selectedOptions[0]; if (!opt) return;
  const row = sel.closest('.grid');
  const priceInp = row?.querySelector('input[name="item_price[]"]');
  if (priceInp) priceInp.value = +opt.dataset.price || 0;
  recalcQuoteEditTotals();
}

function addQuoteSeguimientoNota(quoteId, segId, form) {
  const q = state.quotes.find(x=>x.id===quoteId); if (!q) return;
  const s = (q.seguimientos||[]).find(x=>x.id===segId); if (!s) return;
  const fd = new FormData(form);
  s.notas = fd.get('notas')||'';
  s.estado = 'completado';
  s.completadoAt = today();
  q.notasSeguimiento = q.notasSeguimiento || [];

  save(); openQuoteDetail(quoteId); toast('Seguimiento registrado','ok');
}

  cont.appendChild(row);
  const search = document.getElementById('qe-prod-search');
  if (search && search.value) filterQuoteEditProducts(search.value);
  recalcQuoteEditTotals();
}

function recalcQuoteEditTotals() {
  const cont = document.getElementById('qe-items'); if (!cont) return;
  let grand = 0;
  cont.querySelectorAll('.grid').forEach(r => {
    const qty = +r.querySelector('[name="item_qty[]"]')?.value || 0;
    const price = +r.querySelector('[name="item_price[]"]')?.value || 0;
    const sub = qty * price;
    const cell = r.querySelector('.qe-row-total');
    if (cell) cell.textContent = fmtCOP(sub);
    grand += sub;
  });
  const tot = document.getElementById('qe-grand-total');
  if (tot) tot.textContent = fmtCOP(grand);
}

function updateQuoteEstado(id, estado) {
  const q = state.quotes.find(x=>x.id===id); q.estado=estado;
  if (estado==='aceptada' && q.leadId) { const l=state.leads.find(x=>x.id===q.leadId); if (l) l.estado='Compro'; }
  save(); renderAll(); openQuoteDetail(id); toast('Actualizado','ok');
}

function convertQuoteToOrder(quoteId) {
  closeSlidePanel();
  openSaleForm({quoteId});
}

function exportQuotePDF(quoteId) {
  const q = state.quotes.find(x=>x.id===quoteId);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'mm', format:'a4'});
  const pw = doc.internal.pageSize.width;
  const ph = doc.internal.pageSize.height;

  // Datos del lead/cliente para llenar el header
  const lead = q.leadId ? state.leads.find(x=>x.id===q.leadId) : null;
  const customer = lead || state.customers.find(c=>c.name===q.clientName) || {};
  const asesorEmp = state.employees.find(e=>e.name===q.asesor);

  const sub = q.items.reduce((a,i)=>a+i.qty*i.price,0);
  const tot = quoteTotal(q);
  const flete = q.flete || 0;
  const abono = q.abono || 0;
  const totFinal = tot + flete - abono;

  // Helper: formato número estilo Holman ($ 4.490.000)
  const $$ = (n)=> '$ ' + (Math.round(+n||0)).toLocaleString('es-CO').replace(/,/g,'.');

  // === MARCO EXTERIOR ===
  doc.setDrawColor(0,0,0).setLineWidth(0.4);
  doc.rect(8, 8, pw-16, ph-16);

  // === LOGO CASTOR (header) ===
  // Triángulos estilizados (simulan el logo)
  doc.setFillColor(212,178,107); doc.triangle(18,18, 28,12, 23,28,'F');
  doc.setFillColor(58,82,118);   doc.triangle(28,12, 38,18, 33,28,'F');
  doc.setFillColor(160,90,55);   doc.triangle(23,28, 33,28, 28,38,'F');
  doc.setFontSize(20).setFont(undefined,'bold').setTextColor(40,40,40);
  doc.text('CASTOR', 42, 24);
  doc.setFontSize(7).setFont(undefined,'normal').setTextColor(110,110,110);
  doc.text('MUEBLES Y ACCESORIOS', 42, 30);

  // === HEADER FORM (2 columnas) ===
  const fy0 = 45;
  const lblX = 14;          // labels izq
  const valX = 38;          // valores izq
  const lblXR = pw/2 + 6;   // labels der
  const valXR = pw/2 + 32;  // valores der
  doc.setTextColor(0,0,0).setFontSize(9);
  const fields = [
    { lbl:'CLIENTE',  val:q.clientName||customer.name||'' },
    { lbl:'NIT/ CC.', val:customer.doc||customer.nit||'' },
    { lbl:'EMAIL',    val:customer.email||'' },
    { lbl:'NO. CONTACTO', val:customer.phone||'' }
  ];
  const fieldsR = [
    { lbl:'DIRECCION', val:customer.address||'' },
    { lbl:'CIUDAD',    val:customer.city||q.city||'' },
    { lbl:'FECHA',     val:fmtDate(q.createdAt) },
    { lbl:'METODO DE PAGO', val:q.metodoPago||'' }
  ];
  fields.forEach((f,i)=>{
    const yy = fy0 + i*7;
    doc.setFont(undefined,'bold');  doc.text(f.lbl, valX-2, yy, {align:'right'});
    doc.setFont(undefined,'normal');doc.text(String(f.val), valX, yy);
    doc.setDrawColor(0,0,0).setLineWidth(0.2).line(valX, yy+1.2, valX+50, yy+1.2);
  });
  fieldsR.forEach((f,i)=>{
    const yy = fy0 + i*7;
    doc.setFont(undefined,'bold');  doc.text(f.lbl, valXR-2, yy, {align:'right'});
    doc.setFont(undefined,'normal');doc.text(String(f.val), valXR, yy);
    doc.setDrawColor(0,0,0).setLineWidth(0.2).line(valXR, yy+1.2, valXR+50, yy+1.2);
  });

  // === TABLA: HEADER NEGRO ===
  let ty = fy0 + 4*7 + 8;
  // columnas (mm): IMAGEN(28), PRODUCTO(38), DESCRIPCION(48), QTY(15), PRECIO(24), VALOR TOTAL(28)
  const cols = [
    { x:14, w:28, lbl:'IMAGEN',     align:'center' },
    { x:42, w:38, lbl:'PRODUCTO',   align:'center' },
    { x:80, w:48, lbl:'DESCRIPCION',align:'center' },
    { x:128,w:15, lbl:'QTY',        align:'center' },
    { x:143,w:24, lbl:'PRECIO',     align:'right'  },
    { x:167,w:28, lbl:'VALOR TOTAL',align:'right'  }
  ];
  // Header negro general
  doc.setFillColor(0,0,0); doc.rect(14, ty, 181, 9, 'F');
  // Última columna en dorado
  doc.setFillColor(218,165,32); doc.rect(167, ty, 28, 9, 'F');
  doc.setTextColor(255,255,255).setFont(undefined,'bold').setFontSize(9);
  cols.forEach(c=>{
    const tx = c.align==='right' ? c.x+c.w-2 : c.x+c.w/2;
    doc.text(c.lbl, tx, ty+5.5, {align:c.align});
  });
  ty += 9;

  // === FILAS DE PRODUCTOS ===
  doc.setTextColor(0,0,0).setFont(undefined,'normal').setFontSize(8.5);
  const rowH = 22;
  q.items.forEach((it)=>{
    const p = state.products.find(x=>x.id===it.productId);
    const name = p?.name || it.desc || '';
    const desc = (p?.description || it.desc || '').substring(0,150);
    if (ty + rowH > ph - 60) {
      // nueva página si no cabe
      doc.addPage();
      doc.setDrawColor(0,0,0).setLineWidth(0.4); doc.rect(8,8,pw-16,ph-16);
      ty = 18;
    }
    // bordes celdas
    doc.setDrawColor(150,150,150).setLineWidth(0.1);
    cols.forEach(c => doc.rect(c.x, ty, c.w, rowH));

    // IMAGEN: emoji/foto del producto centrado
    doc.setFontSize(18).setTextColor(120,120,120);
    doc.text(p?.photo||'📦', cols[0].x + cols[0].w/2, ty + rowH/2 + 3, {align:'center'});

    // PRODUCTO (nombre centrado, multilínea)
    doc.setFontSize(8.5).setTextColor(0,0,0).setFont(undefined,'normal');
    const nameLines = doc.splitTextToSize(name, cols[1].w-4);
    doc.text(nameLines, cols[1].x + cols[1].w/2, ty + rowH/2 - (nameLines.length-1)*1.5, {align:'center'});

    // DESCRIPCION (centrada, multilínea)
    doc.setFontSize(8);
    const descLines = doc.splitTextToSize(desc, cols[2].w-4);
    doc.text(descLines, cols[2].x + cols[2].w/2, ty + rowH/2 - (descLines.length-1)*1.4, {align:'center'});

    // QTY centrado
    doc.setFontSize(9);
    doc.text(String(it.qty), cols[3].x + cols[3].w/2, ty + rowH/2 + 1, {align:'center'});

    // PRECIO derecha
    doc.text($$(it.price), cols[4].x + cols[4].w - 3, ty + rowH/2 + 1, {align:'right'});

    // VALOR TOTAL derecha
    doc.text($$(it.qty*it.price), cols[5].x + cols[5].w - 3, ty + rowH/2 + 1, {align:'right'});

    ty += rowH;
  });

  // === BLOQUE FINAL: NOTAS (izq) + TOTALES (der) ===
  if (ty + 30 > ph - 50) { doc.addPage(); doc.setDrawColor(0,0,0).setLineWidth(0.4); doc.rect(8,8,pw-16,ph-16); ty = 18; }
  ty += 4;

  // Caja inferior con bordes
  const totalsX = 142;
  const totalsW = 53;
  doc.setDrawColor(0,0,0).setLineWidth(0.3);

  // Notas izquierda
  doc.setTextColor(0,0,0).setFontSize(9).setFont(undefined,'bold');
  doc.text('NOTA:', 14, ty+5);
  doc.setFont(undefined,'normal');
  doc.text('Esta cotizacion es valida por '+(q.vigenciaDias||30)+' días. ', 26, ty+5);
  doc.setFont(undefined,'bold').text('ESTA COTIZACION YA INCLUYE EL IVA', 26, ty+10);
  doc.setFont(undefined,'normal').setFontSize(8.5);
  doc.text('Nuestros tiempos de producción son de 40 a 50 días calendario.', 14, ty+16);
  if (q.notes) {
    const nlines = doc.splitTextToSize(q.notes, 120);
    doc.text(nlines, 14, ty+22);
  }

  // Totales derecha
  doc.setFontSize(9);
  const totRows = [
    { lbl:'SUBTOTAL', val:$$(sub), bold:true },
    { lbl:'ABONO',    val: abono>0?$$(abono):'-', bold:false },
    { lbl:'FLETE',    val: flete>0?$$(flete):$$(0), bold:false },
    { lbl:'TOTAL',    val:$$(totFinal), bold:true, hl:true }
  ];
  let tty = ty + 4;
  totRows.forEach(r=>{
    doc.setFont(undefined, r.bold?'bold':'normal');
    doc.setTextColor(0,0,0);
    doc.text(r.lbl, totalsX, tty, {align:'right'});
    if (r.hl) {
      doc.setFillColor(245,245,245); doc.rect(totalsX+2, tty-4, totalsW-4, 6, 'F');
    }
    doc.text(r.val, totalsX + totalsW - 2, tty, {align:'right'});
    tty += 6;
  });

  // === FOOTER ASESOR ===
  let fy = ph - 38;
  doc.setDrawColor(0,0,0).setLineWidth(0.3);
  doc.rect(14, fy, pw-28, 12);
  doc.setFontSize(8).setFont(undefined,'bold').setTextColor(0,0,0);
  doc.text('NOMBRE DEL ASESOR', 38, fy+4, {align:'right'});
  doc.text('EMAIL', 38, fy+8, {align:'right'});
  doc.text('CELULAR', 38, fy+12, {align:'right'});
  doc.setFont(undefined,'normal');
  doc.text((q.asesor||'').toUpperCase(), 40, fy+4);
  doc.text(asesorEmp?.email||'', 40, fy+8);
  doc.text(asesorEmp?.phone||'3184199681', 40, fy+12);

  // === FOOTER CONTACTO CASTOR ===
  fy = ph - 22;
  doc.setFontSize(8).setTextColor(60,60,60).setFont(undefined,'normal');
  doc.text('🌐 www.castormya.co     f @castormueblesyaccesorios     📞 3182396820     ✉ talkwithcastor@gmail.com', pw/2, fy, {align:'center'});
  doc.text('📍 Barranquilla: Cra 65 # 76 - 152 / Cra 43 # 84 - 204    Cartagena: Cra 3 # 7 - 58    Medellín: Cra 43F # 12 - 19', pw/2, fy+4, {align:'center'});

  doc.save(`Cotizacion_${q.id}_${(q.clientName||'').replace(/\s+/g,'_')}.pdf`);
  toast('PDF generado con diseño Castor','ok');
}

        })()}

function solicitarFacturaPedido(pedidoId) {
  const p = (state.pedidos||[]).find(x=>x.id===pedidoId); if (!p) return;
  state.invoiceRequests = state.invoiceRequests || [];
  if (state.invoiceRequests.find(r=>r.pedidoId===pedidoId && r.estado!=='rechazado')) { toast('Ya existe solicitud','info'); return; }
  const reqId = uid('IRQ');
  const ops = state.orders.filter(o=>o.pedidoId===pedidoId);
  state.invoiceRequests.unshift({ id:reqId, pedidoId, orderId:ops[0]?.id||null, orderIds:ops.map(o=>o.id), docType:p.docType||'factura', requestedAt:nowISO(), requestedBy:state.currentUser?.name||'—', estado:'pendiente_auditoria' });
  pushNotification({ type:'warning', text:`Auditoría: revisar solicitud ${p.docType||'factura'} para ${p.id}`, link:'auditoria', key:`audit_${reqId}` });
  save(); renderAll(); closeSlidePanel(); toast('Solicitud enviada a auditoría','ok');
}

function solicitarDespachoPedido(pedidoId) {
  const p = (state.pedidos||[]).find(x=>x.id===pedidoId); if (!p) return;
  state.dispatchRequests = state.dispatchRequests || [];
  state.counters.disp = (state.counters.disp||0)+1;
  const dId = 'DSP-'+String(state.counters.disp).padStart(3,'0');
  const ops = state.orders.filter(o=>o.pedidoId===pedidoId);
  state.dispatchRequests.unshift({ id:dId, pedidoId, orderId:ops[0]?.id||null, orderIds:ops.map(o=>o.id), clientName:p.clientName, city:state.customers.find(c=>c.id===p.customerId)?.city||'', address:p.deliveryAddress||p.address||'', requestedAt:nowISO(), requestedBy:state.currentUser?.name||'—', estado:'pendiente' });
  ops.forEach(o=>{ o.estado = 'solicitud_despacho'; });
  pushNotification({ type:'info', text:`Despacho solicitado: ${p.id}`, link:'despacho', key:`disp_${dId}` });
  save(); renderAll(); closeSlidePanel(); toast('Solicitud de despacho enviada','ok');
}
function updateOrderEstado(id, estado) {
  const o = state.orders.find(x=>x.id===id); if (!o) { toast('Pedido no encontrado','error'); return; }
  o.estado = estado;
  if (estado==='entregado') o.readyToInvoice = true;
  if (estado==='listo_produccion') {
    pushNotification({ type:'warning', text:`OP ${o.id} lista — solicitar factura/remisión`, targetUser:o.asesor, link:`ventas`, key:`listo_${o.id}` });
  }
  save(); renderPage(); toast(`Pedido ${o.id} → ${estado}`,'ok');
}

function solicitarFactura(orderId) {
  const o = state.orders.find(x=>x.id===orderId); if (!o) return;
  state.invoiceRequests = state.invoiceRequests || [];
  if (state.invoiceRequests.find(r=>r.orderId===orderId && r.estado!=='rechazado')) { toast('Ya existe solicitud','info'); return; }
  const reqId = uid('IRQ');
  state.invoiceRequests.unshift({ id:reqId, orderId, docType:o.docType||'factura', requestedAt:nowISO(), requestedBy:state.currentUser?.name||'—', estado:'pendiente_auditoria' });
  pushNotification({ type:'warning', text:`Auditoría: revisar solicitud ${o.docType||'factura'} para ${o.id}`, link:'auditoria', key:`audit_${reqId}` });
  save(); renderAll(); toast('Solicitud enviada a auditoría','ok');
}

function aprobarSolicitudFactura(reqId) {
  const r = (state.invoiceRequests||[]).find(x=>x.id===reqId); if (!r) return;
  r.estado = 'aprobado'; r.approvedAt = nowISO(); r.approvedBy = state.currentUser?.name||'Auditoría';
  // Cerrar todas las OPs del pedido
  const ids = r.orderIds || (r.orderId?[r.orderId]:[]);
  ids.forEach(id=>{ const o=state.orders.find(x=>x.id===id); if (o) o.estado='op_cerrada'; });
  const ref = r.pedidoId || r.orderId || ids[0];
  pushNotification({ type:'info', text:`Contabilidad: emitir ${r.docType} para ${ref}`, link:'contabilidad', key:`cont_${reqId}` });
  save(); renderAll(); toast('Solicitud aprobada · OP(s) cerradas','ok');
}

function emitirFacturaDesdeContabilidad(reqId) {
  const r = (state.invoiceRequests||[]).find(x=>x.id===reqId); if (!r || r.estado!=='aprobado') return;
  const ids = r.orderIds || (r.orderId?[r.orderId]:[]);
  const orders = ids.map(id=>state.orders.find(x=>x.id===id)).filter(Boolean);
  if (!orders.length) return;
  const ped = r.pedidoId ? (state.pedidos||[]).find(p=>p.id===r.pedidoId) : null;
  state.invoices = state.invoices||[];
  state.counters.fac = (state.counters.fac||0)+1;
  const invId = (r.docType==='remisión'?'REM-':'FAC-')+String(state.counters.fac).padStart(4,'0');
  const total = ped?ped.total:orders.reduce((a,o)=>a+(+o.total||0),0);
  state.invoices.unshift({ id:invId, pedidoId:r.pedidoId||null, orderId:orders[0].id, orderIds:ids, customerId:orders[0].customerId, docType:r.docType, type:r.docType, total, amount:total, emitDate:today(), issuedAt:today(), issuedBy:state.currentUser?.name||'Contabilidad', estado:'emitida' });
  r.estado = 'emitido'; r.invoiceId = invId;
  orders.forEach(o=>{ o.estado='facturado'; o.invoiceId=invId; });
  const ref = ped?ped.id:orders[0].id;
  pushNotification({ type:'info', text:`${invId} emitida — ${ref} puede solicitar despacho`, targetUser:orders[0].asesor, link:'ventas', key:`inv_${invId}` });
  safeAccountingHook('postSale', state.invoices[0]);
  save(); renderAll(); toast(`${invId} emitida`,'ok');
}

function solicitarDespacho(orderId) {
  // Compat legacy — redirige al pedido si existe
  const o = state.orders.find(x=>x.id===orderId); if (!o) return;
  if (o.pedidoId) return solicitarDespachoPedido(o.pedidoId);
  state.dispatchRequests = state.dispatchRequests || [];
  state.counters.disp = (state.counters.disp||0)+1;
  const dId = 'DSP-'+String(state.counters.disp).padStart(3,'0');
  state.dispatchRequests.unshift({ id:dId, orderId, requestedAt:nowISO(), requestedBy:state.currentUser?.name||'—', estado:'pendiente', address:o.deliveryAddress||o.address||'' });
  o.estado = 'solicitud_despacho';
  pushNotification({ type:'info', text:`Despacho solicitado: ${o.id}`, link:'despacho', key:`disp_${dId}` });
  save(); renderAll(); toast('Solicitud de despacho enviada','ok');
}

          </div>

        </div>
      </div>
    </div>

    <div class="panel-2 p-4 rounded mb-5">
      <div class="flex justify-between text-sm mb-1"><span class="text-brand-muted">Subtotal stock</span><span id="sf-sub-stock" class="text-white">$0</span></div>
      <div class="flex justify-between text-sm mb-1"><span class="text-brand-muted">Subtotal producción</span><span id="sf-sub-prod" class="text-white">$0</span></div>
      <div class="flex justify-between text-sm mb-1"><span class="text-brand-muted">Descuento total</span><span id="sf-disc-total" class="text-red-400">-$0</span></div>
      <div class="flex justify-between text-base pt-2 mt-2" style="border-top:1px solid #2A4061"><span class="font-bold gold-title">Total venta</span><span id="sf-total" class="font-bold text-brand-gold">$0</span></div>
    </div>

    <div class="flex justify-end gap-2">
      <button type="button" onclick="closeModal('modal-sale')" class="btn-outline">Cancelar</button>
      <button type="submit" class="btn-gold">${isInnovation?'Registrar venta innovación':'Registrar venta'}</button>
    </div>
  </form>`;
  showModal('modal-sale', html);
  filterCustResults();
  if (isInnovation) {
    addSaleInnovItemRow();
  } else if (q) {
    q.items.forEach(it => addSaleItemRow({ productId:it.productId, qty:it.qty, price:it.price }));
  } else {
    addSaleItemRow();
  }
}

function recalcSaleInnov() {
  const rows = [...document.querySelectorAll('#sale-items > .panel')];
  let total = 0;
  rows.forEach(r=>{
    const q = +r.querySelector('[name="innov_qty[]"]')?.value||0;
    const p = +r.querySelector('[name="innov_price[]"]')?.value||0;
    total += q*p;
  });
  const t = document.getElementById('sf-total'); if (t) t.textContent = fmtCOP(total);
  const s = document.getElementById('sf-sub-prod'); if (s) s.textContent = fmtCOP(total);
  const paidPct = +(document.querySelector('[name="paid"]')?.value||0);
  const payAmt = document.getElementById('sf-pay-amt');
  if (payAmt && !payAmt.dataset.manual) payAmt.value = Math.round(total*paidPct/100);
}

function onSaleItemTypeChange(radio) {
  const panel = radio.closest('.panel');
  const type = radio.value;
  panel.querySelector('input[name="item_type[]"]').value = type;
  const sel = panel.querySelector('[name="item_product[]"]');
  sel.dataset.type = type;
  // Repopulate options to filter only products with available stock when type=stock
  const current = sel.value;
  if (type==='stock') {
    const stocked = [...new Set(state.finishedStock.filter(f=>f.status==='disponible'&&f.qty>0).map(f=>f.productId))];
    sel.innerHTML = '<option value="">— Producto en stock —</option>' + state.products.filter(p=>stocked.includes(p.id)).map(p=>{
      const avail = state.finishedStock.filter(f=>f.productId===p.id && f.status==='disponible').reduce((a,f)=>a+f.qty,0);
      return `<option value="${p.id}" data-price="${p.price}" data-name="${escape(p.name)}">${escape(p.name)} — stock: ${avail} — ${fmtCOP(p.price)}</option>`;
    }).join('');
  } else {
    sel.innerHTML = '<option value="">— Producto —</option>' + state.products.filter(isProductActiveForSale).map(p=>`<option value="${p.id}" data-price="${p.price}" data-name="${escape(p.name)}">${escape(p.name)} — ${fmtCOP(p.price)}</option>`).join('');
  }
  if (current) { sel.value = current; }
  onSaleItemProductChange(sel);
}

function onSaleItemProductChange(sel) {
  if (!sel || !sel.value) { const info = sel?.closest('.panel')?.querySelector('.sf-item-info'); if (info) info.innerHTML='&nbsp;'; const ac = sel?.closest('.panel')?.querySelector('.sf-item-acabados'); if (ac) { ac.innerHTML=''; ac.style.display='none'; } recalcSale(); return; }
  const panel = sel.closest('.panel');
  const type = panel.querySelector('input[name="item_type[]"]').value;
  const opt = sel.options[sel.selectedIndex];
  const priceInput = panel.querySelector('[name="item_price[]"]');
  priceInput.value = +opt.dataset.price||0;
  const qty = +panel.querySelector('[name="item_qty[]"]').value||1;
  const info = panel.querySelector('.sf-item-info');
  const p = state.products.find(x=>x.id===sel.value);
  if (type==='stock') {
    const locations = state.finishedStock.filter(f=>f.productId===sel.value && f.status==='disponible' && f.qty>0);
    const avail = locations.reduce((a,f)=>a+f.qty,0);
    const locTxt = locations.map(f=>{ const w=state.warehouses.find(x=>x.id===f.warehouseId); return `<span class="inline-block px-2 py-0.5 rounded mr-1 mb-1" style="background:${w?.color||'#2A4061'}33;color:${w?.color||'#C9A961'};border:1px solid ${w?.color||'#2A4061'}66">${escape(w?.name||f.warehouseId)}: ${f.qty}</span>`; }).join('');
    if (avail>=qty) info.innerHTML = `<span class="text-emerald-300">✓ Disponible ${avail} uds</span> · Ubicaciones: ${locTxt||'—'}`;
    else info.innerHTML = `<span class="text-red-400">✗ Stock insuficiente (disp: ${avail}, solicitado: ${qty})</span> · ${locTxt}`;
  } else {
    info.innerHTML = `<span class="text-amber-300">⚙ Bajo pedido</span> · áreas: ${p?.areas?.join(' → ')||'—'}`;
  }
  renderSaleAcabados(panel, p, type);
  recalcSale();
}

  const areas = product.areas||[];

  if (areas.includes('Preparación y pintura')) {
    parts.push(`<div><label class="label text-[10px]">Color madera *</label><select name="acab_madera[]" required onchange="onAcabMaderaChange(this)" class="input-field text-xs">${['',...COLOR_MADERA].map(c=>`<option value="${c}">${c||'— elegir —'}</option>`).join('')}</select><input name="acab_madera_otro[]" placeholder='Especificar "Otro"' class="input-field text-xs mt-1" style="display:none"></div>`);
  } else parts.push('<input type="hidden" name="acab_madera[]" value=""><input type="hidden" name="acab_madera_otro[]" value="">');
  if (areas.includes('Pintura electrostática')) {
    parts.push(`<div><label class="label text-[10px]">Color metal *</label><select name="acab_metal[]" required class="input-field text-xs">${['',...COLOR_METAL].map(c=>`<option value="${c}">${c||'— elegir —'}</option>`).join('')}</select></div>`);
  } else parts.push('<input type="hidden" name="acab_metal[]" value="">');
  if (areas.includes('Tapicería')) {
    parts.push(`<div class="relative">
      <label class="label text-[10px]">Tela tapicería * (buscar por nombre)</label>
      <div class="flex gap-1">
        <input type="text" class="input-field text-xs flex-1 acab-tela-search" placeholder="Escribe el nombre de la tela..." oninput="filterTelaSearch(this)" onfocus="filterTelaSearch(this)" onblur="setTimeout(()=>this.parentElement.nextElementSibling?.classList.add('hidden'),180)" required>
        <button type="button" onclick="quickAddTela(this)" class="btn-outline text-xs px-2">+</button>
      </div>
      <input type="hidden" name="acab_tela[]" class="acab-tela-id" required>
      <div class="acab-tela-dd hidden absolute left-0 right-0 top-full mt-1 max-h-40 overflow-y-auto scrollbar-thin panel z-50"></div>
    </div>`);
  } else parts.push('<input type="hidden" name="acab_tela[]" value="">');
  if (areas.includes('Tejido')) {
    parts.push(`<div><label class="label text-[10px]">Color tejido *</label><select name="acab_tejido[]" required class="input-field text-xs">${['',...COLOR_TEJIDO].map(c=>`<option value="${c}">${c||'— elegir —'}</option>`).join('')}</select></div>`);
  } else parts.push('<input type="hidden" name="acab_tejido[]" value="">');
  cont.innerHTML = parts.join('');
  cont.style.display = (areas.some(a=>['Preparación y pintura','Pintura electrostática','Tapicería','Tejido'].includes(a))) ? 'grid' : 'none';
}

function filterTelaSearch(inp) {
  const wrap = inp.closest('.relative');
  const dd = wrap.querySelector('.acab-tela-dd');

  const q = inp.value.toLowerCase().trim();
  const telas = state.supplies.filter(s => s.category==='Telas' || s.category==='Textiles');
  const matches = telas.filter(t => !q || `${t.name} ${t.id}`.toLowerCase().includes(q)).slice(0,15);
  dd.innerHTML = matches.length ? matches.map(t=>`<div onclick="pickTela(this,'${t.id}')" class="px-3 py-1.5 text-xs hover:bg-brand-navy/40 cursor-pointer text-white">${escape(t.name)} <span class="text-brand-muted">· ${escape(t.id)} · ${fmtCOP(t.cost)}/${escape(t.unit||'Mts')}</span></div>`).join('') : '<div class="px-3 py-2 text-xs text-brand-muted italic">Sin coincidencias — usa "+" para crear</div>';

function recalcSale() {
  const rows = [...document.querySelectorAll('#sale-items > .panel')];
  let subStockBruto = 0, subProdBruto = 0, discTotal = 0;
  rows.forEach(r => {
    const type = r.querySelector('input[name="item_type[]"]')?.value;
    if (!type) return; // saltar filas innovación
    const qty = +r.querySelector('[name="item_qty[]"]').value||0;
    const price = +r.querySelector('[name="item_price[]"]').value||0;
    const disc = +r.querySelector('[name="item_disc[]"]').value||0;
    const lineBruto = qty*price;
    const lineDesc  = lineBruto * (disc/100);
    const lineNeto = Math.round(lineBruto - lineDesc);
    discTotal += lineDesc;
    if (type==='stock') subStockBruto += lineBruto; else subProdBruto += lineBruto;
    // Total por fila visible = NETO del producto (con su descuento individual)
    const cell = r.querySelector('.sf-item-total');
    if (cell) cell.textContent = fmtCOP(lineNeto);
  });
  // Subtotales SIN descuento aplicado (valor bruto por tipo)
  const total = Math.round(subStockBruto + subProdBruto - discTotal);
  const s = document.getElementById('sf-sub-stock'); if (s) s.textContent = fmtCOP(Math.round(subStockBruto));
  const p = document.getElementById('sf-sub-prod');  if (p) p.textContent = fmtCOP(Math.round(subProdBruto));
  const d = document.getElementById('sf-disc-total'); if (d) d.textContent = '-'+fmtCOP(Math.round(discTotal));
  const t = document.getElementById('sf-total');     if (t) t.textContent = fmtCOP(total);
  // Auto-sugerir pago anticipo cuando el usuario edite %
  const paidPct = +(document.querySelector('[name="paid"]')?.value||0);
  const payAmt = document.getElementById('sf-pay-amt');
  if (payAmt && (!payAmt.dataset.manual)) payAmt.value = Math.round(total*paidPct/100);
}

function saveSale(form) {
  const fd = new FormData(form);
  const isInnovation = fd.get('innovation')==='1';
  const asesor = fd.get('asesor');
  const tiempo = +fd.get('tiempo')||30;
  const docType = fd.get('docType');
  const quoteId = fd.get('quoteId')||null;
  let clientName = fd.get('custName');
  if (!clientName) { toast('Nombre de cliente requerido','error'); return; }
  if (!docType) { toast('Elige tipo de documento (factura/remisión)','error'); return; }
  if (!fd.get('paySoporteFilename')) { toast('Adjunta el soporte de pago','error'); return; }

  // Cliente: usar seleccionado o crear nuevo
  let customerId = fd.get('customerId');
  if (!customerId) {
    customerId = 'C-'+String(state.customers.length+1).padStart(3,'0');
    state.customers.push({
      id: customerId,
      name: clientName,
      tipo: 'persona',
      doc:  fd.get('custDoc')||'',
      phone:fd.get('custPhone')||'',
      email:fd.get('custEmail')||'',
      city: fd.get('custCity')||'',
      address: fd.get('custAddress')||'',
      deliveryAddress: fd.get('custDeliveryAddress')||'',
      asesor,
      createdAt: today(),
      fromLead: null,
      linkedLeadId: quoteId ? (state.quotes.find(q=>q.id===quoteId)?.leadId||null) : null,
      postSales: [],
      notes: [], seguimientos: []
    });
    toast(`Cliente ${clientName} creado`,'ok');
  } else {
    const c = state.customers.find(x=>x.id===customerId);
    if (c) {
      c.address = fd.get('custAddress')||c.address;
      c.deliveryAddress = fd.get('custDeliveryAddress')||c.deliveryAddress;
      c.postSales = c.postSales || []; c.notes = c.notes || []; c.seguimientos = c.seguimientos || [];
      if (!c.linkedLeadId && quoteId) c.linkedLeadId = state.quotes.find(q=>q.id===quoteId)?.leadId||null;
    }
  }

  // Crear PEDIDO (cabeza) que agrupa todas las OPs
  if (!state.pedidos) state.pedidos = [];
  if (!state.counters.pedV7) state.counters.pedV7 = 1260;
  state.counters.pedV7++;
  const pedidoId = 'P-'+state.counters.pedV7;
  const pedido = {
    id: pedidoId, customerId, clientName, quoteId, asesor, tiempo, docType,
    address: fd.get('custAddress')||'', deliveryAddress: fd.get('custDeliveryAddress')||'',
    orderDate: today(), dueDate: addDays(today(), tiempo),
    total: 0, paid: 0,
    medio: fd.get('medio')||'',
    pdv: fd.get('pdv')||'',
    cierreVenta: fd.get('cierreVenta')||'',
    abonoBancos: fd.get('abonoBancos')||'',
    estado: 'activo', tipo: isInnovation?'innovacion':'mixto',
    notes:[], seguimientos:[]
  };

  const createdIds = [];
  if (isInnovation) {
    const refPhoto = fd.get('innovReferencePhoto');
    const consentPhoto = fd.get('innovConsentPhoto');
    if (!refPhoto) { toast('Debes adjuntar la foto de referencia','error'); return; }
    if (!consentPhoto) { toast('Debes adjuntar la foto del consentimiento del cliente','error'); return; }
    const names = fd.getAll('innov_name[]');
    const descs = fd.getAll('innov_desc[]');
    const iqtys = fd.getAll('innov_qty[]').map(n=>+n);
    const iprs  = fd.getAll('innov_price[]').map(n=>+n);
    const iars  = fd.getAll('innov_areas[]');
    const icomments = fd.getAll('innov_comment[]');
    const valid = [];
    for (let i=0;i<names.length;i++) if (names[i] && iqtys[i]>0 && iprs[i]>0) valid.push({ name:names[i], desc:descs[i], qty:iqtys[i], price:iprs[i], areas:iars[i], comment:icomments[i]||'' });
    if (!valid.length) { toast('Agrega al menos un producto propuesto','error'); return; }
    pedido.requiresManagerApproval = true;
    pedido.estado = 'pendiente_aprobacion_gerencia';
    pedido.referencePhoto = refPhoto;
    pedido.consentPhoto = consentPhoto;
    valid.forEach(it => {
      state.counters.op++;
      const opId = 'OP-'+state.counters.op;
      state.counters.innov = (state.counters.innov||0)+1;
      const innovId = 'INN-'+state.counters.innov;
      const line = it.qty*it.price;
      state.orders.unshift({
        id:opId, pedidoId, quoteId, customerId, clientName, total:line, paid:0, tiempo,
        orderDate:today(), dueDate:addDays(today(),tiempo),
        estado:'pendiente_aprobacion_gerencia', area:null, asesor,
        tipo:'innovacion', verified:false, docType,
        address: pedido.address, deliveryAddress: pedido.deliveryAddress,
        innovationId: innovId, comment: it.comment,
        referencePhoto: refPhoto, consentPhoto,
        productoPropuesto: { name:it.name, desc:it.desc, areas:it.areas, qty:it.qty, price:it.price, comment:it.comment }
      });
      state.innovation = state.innovation||[];
      state.innovation.push({ id:innovId, orderId:opId, pedidoId, name:it.name, desc:it.desc, areas:it.areas, comment:it.comment, referencePhoto:refPhoto, consentPhoto, estado:'pendiente_aprobacion_gerencia', createdAt:today(), asesor });
      createdIds.push(opId);
    });
    pushNotification({ type:'warning', text:`Venta innovación ${pedidoId} de ${clientName} requiere aprobación de gerencia`, targetUser:'Alexander Vivas', link:'innovacion', key:'innovAprob-'+pedidoId });
  } else {
    const types  = fd.getAll('item_type[]');
    const prods  = fd.getAll('item_product[]');
    const qtys   = fd.getAll('item_qty[]').map(n=>+n);
    const prices = fd.getAll('item_price[]').map(n=>+n);
    const discs  = fd.getAll('item_disc[]').map(n=>+n||0);
    const comments = fd.getAll('item_comment[]');
    const maderas = fd.getAll('acab_madera[]');
    const maderaOtros = fd.getAll('acab_madera_otro[]');
    const metales = fd.getAll('acab_metal[]');
    const telas   = fd.getAll('acab_tela[]');
    const tejidos = fd.getAll('acab_tejido[]');
    const items = [];
    for (let i=0;i<prods.length;i++) {
      if (!prods[i] || qtys[i]<=0 || prices[i]<=0) continue;
      items.push({
        type:types[i], productId:prods[i], qty:qtys[i], price:prices[i], discount:discs[i], comment:comments[i]||'',
        acabados: {
          colorMadera: maderas[i]==='Otro' ? (maderaOtros[i]||'Otro') : (maderas[i]||''),
          colorMetal: metales[i]||'',
          telaId: telas[i]||'',
          colorTejido: tejidos[i]||''
        }
      });
    }
    if (!items.length) { toast('Agrega al menos un item válido','error'); return; }
    for (const it of items.filter(x=>x.type==='stock')) {
      const avail = state.finishedStock.filter(f=>f.productId===it.productId && f.status==='disponible').reduce((a,f)=>a+f.qty,0);
      if (avail < it.qty) { const p=state.products.find(x=>x.id===it.productId); toast(`Stock insuficiente para ${p?.name||it.productId} (disp: ${avail})`,'error'); return; }
    }
    const allStock = items.every(x=>x.type==='stock');
    const allProd = items.every(x=>x.type==='produccion');
    pedido.tipo = allStock?'stock':allProd?'produccion':'mixto';
    items.forEach(it => {
      state.counters.op++;
      const opId = 'OP-'+state.counters.op;
      const line = Math.round(it.qty*it.price*(1-(it.discount||0)/100));
      state.orders.unshift({
        id:opId, pedidoId, quoteId, customerId, clientName,
        total:line, paid:0, tiempo: it.type==='stock'?0:tiempo,
        orderDate:today(), dueDate: it.type==='stock'?today():addDays(today(), tiempo),
        estado: it.type==='stock' ? 'listo' : 'pendiente_op',
        area: it.type==='stock' ? 'Listo' : null,
        asesor, tipo:it.type, verified: it.type==='stock',
        productId: it.productId, qty: it.qty, price: it.price, discount: it.discount||0,
        docType, acabados: it.acabados, comment: it.comment||'',
        address: pedido.address, deliveryAddress: pedido.deliveryAddress
      });
      createdIds.push(opId);
      if (it.type==='stock') {
        // Descuenta de bodega (puede ser cualquier bodega)
        let remaining = it.qty;
        for (const fs of state.finishedStock.filter(f=>f.productId===it.productId && f.status==='disponible')) {
          if (remaining<=0) break;
          const take = Math.min(fs.qty, remaining);
          fs.qty -= take; remaining -= take;
          // Marcar como reservado para el pedido
          if (fs.qty===0) { fs.status = 'reservado'; fs.orderId = opId; fs.pedidoId = pedidoId; }
          else { // Parte se queda disponible, parte reservada como ítem nuevo
            state.finishedStock.push({ id:uid('FS'), productId:fs.productId, warehouseId:fs.warehouseId, qty:take, status:'reservado', orderId:opId, pedidoId, readyDate:today(), notes:`Reservado pedido ${pedidoId}` });
          }
        }
        state.finishedStock = state.finishedStock.filter(f=>f.qty>0 || f.orderId);
        // También bajar stock del producto maestro
        const pm = state.products.find(p=>p.id===it.productId); if (pm) pm.stock = Math.max(0, (pm.stock||0) - it.qty);
        state.counters.mov++;
        state.stockMoves = state.stockMoves || [];
        state.stockMoves.push({ id:'SM-'+state.counters.mov, orderId:opId, pedidoId, productId:it.productId, qty:it.qty, type:'salida_venta', date:today(), reason:'Venta pedido '+pedidoId });
      }
    });
  }

  pedido.total = createdIds.reduce((a,id)=>a+(state.orders.find(o=>o.id===id)?.total||0),0);
  state.pedidos.unshift(pedido);

  const payAmount = +fd.get('payAmount')||0;
  if (payAmount>0) {
    state.counters.pag++;
    state.payments.unshift({
      id:'PAG-'+state.counters.pag,
      pedidoId, // ← Pagos al PEDIDO, no a la OP
      orderIds: createdIds,
      amount: payAmount,
      method: fd.get('payMethod'),
      bankId: fd.get('payBankId'),
      type:'anticipo',
      date: today(),
      reference: fd.get('payReference')||'',
      soporte: { filename: fd.get('paySoporteFilename'), uploadedAt: nowISO() },
      estado:'pendiente',
      registeredBy: asesor
    });
    pedido.paid = pedido.total ? Math.min(100, Math.round(payAmount/pedido.total*100)) : 0;
    // También reflejar en cada OP
    createdIds.forEach(id => {
      const o = state.orders.find(x=>x.id===id);
      o.paid = pedido.paid;
    });
  }

  if (quoteId) {
    const q = state.quotes.find(x=>x.id===quoteId);
    if (q) { q.pedidoId = pedidoId; q.orderId = createdIds[0]; }
    if (q?.leadId) { const l=state.leads.find(x=>x.id===q.leadId); if (l) l.estado='ganado'; }
  }

  save(); closeModal('modal-sale'); renderAll();
  toast(`Pedido ${pedidoId} registrado con ${createdIds.length} OP(s).`,'ok');
}

/* ---------- PRODUCCION ---------- */
let prodFilters = { area:'', producto:'', search:'', asesor:'', sortBy:'orderDate', sortDir:'desc' };
let prodBoardMode = 'cards'; // 'cards' | 'compact' | 'heatmap'
let _prodSearchTimer = null;
function onProdSearchInput(inp) {
  prodFilters.search = inp.value;
  const pos = inp.selectionStart;
  if (_prodSearchTimer) clearTimeout(_prodSearchTimer);
  _prodSearchTimer = setTimeout(() => {
    renderPage();
    // restituir foco y cursor al nuevo input creado por renderPage
    requestAnimationFrame(() => {
      const fresh = document.getElementById('prod-search-input');
      if (fresh) { fresh.focus(); try { fresh.setSelectionRange(pos, pos); } catch(e){} }
    });
  }, 180);
}
function setProdSort(col) {
  if (prodFilters.sortBy===col) prodFilters.sortDir = prodFilters.sortDir==='asc'?'desc':'asc';
  else { prodFilters.sortBy = col; prodFilters.sortDir = 'asc'; }
  renderPage();
}
function prodSortArrow(col) {
  if (prodFilters.sortBy!==col) return '<span class="text-brand-muted/50">↕</span>';
  return prodFilters.sortDir==='asc' ? '<span class="text-brand-gold">↑</span>' : '<span class="text-brand-gold">↓</span>';
}
PAGE_RENDERERS.produccion = () => {
  // Todas las OPs activas (verificadas, no entregadas ni canceladas)
  let active = state.orders.filter(o => o.verified && o.tipo!=='stock' && !['entregado','cancelado'].includes(o.estado));
  if (prodFilters.area) active = active.filter(o=>o.area===prodFilters.area);
  if (prodFilters.producto) active = active.filter(o=>o.productId===prodFilters.producto);
  if (prodFilters.asesor) active = active.filter(o=>o.asesor===prodFilters.asesor);
  if (prodFilters.search) {
    const q = prodFilters.search.toLowerCase();
    active = active.filter(o => { const pr=state.products.find(p=>p.id===o.productId); return `${o.id} ${o.pedidoId||''} ${o.clientName||''} ${pr?.name||''} ${o.asesor||''} ${o.area||''}`.toLowerCase().includes(q); });
  }
  // Orden
  active.sort((a,b)=>{
    const col = prodFilters.sortBy, dir = prodFilters.sortDir==='asc'?1:-1;
    let va, vb;
    if (col==='dias') { va = a.dueDate?daysBetween(today(),a.dueDate):99999; vb = b.dueDate?daysBetween(today(),b.dueDate):99999; }
    else if (col==='cliente') { va = (a.clientName||'').toLowerCase(); vb = (b.clientName||'').toLowerCase(); }
    else if (col==='producto') { const pa=state.products.find(p=>p.id===a.productId), pb=state.products.find(p=>p.id===b.productId); va=(pa?.name||'').toLowerCase(); vb=(pb?.name||'').toLowerCase(); }
    else if (col==='progreso') { va=Math.round((a.orderDate?daysBetween(a.orderDate,today()):0)/(a.tiempo||1)*100); vb=Math.round((b.orderDate?daysBetween(b.orderDate,today()):0)/(b.tiempo||1)*100); }
    else if (col==='area') { va=(a.area||'').toLowerCase(); vb=(b.area||'').toLowerCase(); }
    else if (col==='vence') { va=a.dueDate||''; vb=b.dueDate||''; }
    else { va=a.orderDate||''; vb=b.orderDate||''; }
    if (va<vb) return -1*dir; if (va>vb) return 1*dir; return 0;
  });

  // Agrupados por área para Kanban
  const byArea = {};
  PROD_AREAS.forEach(a => byArea[a] = []);
  active.forEach(o => { if (o.area && byArea[o.area]) byArea[o.area].push(o); });

  const alertas = active.filter(o=>o.dueDate && daysBetween(today(),o.dueDate)<=7);
  const listosTotal = state.orders.filter(o=>o.estado==='listo').length;

  return `
  <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
    ${kpiCard('OPs activas', active.length, 'En proceso', 'gear', '#C9A961')}
    ${kpiCard('Alertas ≤7 días', alertas.length, alertas.length?'Atención':'Todo ok', 'shield', alertas.length?'#ef4444':'#10b981')}
    ${kpiCard('Tiempo prom.', `${Math.round(active.reduce((a,o)=>a+(o.tiempo||0),0)/(active.length||1))} días`, 'Ciclo', 'check', '#3b82f6')}
    ${kpiCard('Listos', listosTotal, 'Pendientes envío', 'cart', '#A88D4B')}
  </div>

  ${alertas.length?`<div class="panel p-5 mb-6" style="border-color:#ef4444"><h3 class="text-red-300 font-semibold mb-3">⚠ Alertas cierre de tiempo</h3><div class="space-y-2">${alertas.map(o=>{ const d=daysBetween(today(),o.dueDate); return `
    <div class="flex items-center justify-between panel-2 p-3 rounded" style="border-color:rgba(239,68,68,0.3)">
      <div><div class="font-semibold text-white">${o.id} · ${escape(o.clientName)}</div><div class="text-xs text-brand-muted">Iniciado ${fmtDate(o.orderDate)} · Vence ${fmtDate(o.dueDate)} · Área: ${o.area||'—'}</div></div>
      <div class="text-right"><div class="text-2xl font-bold ${d<=3?'text-red-400':'text-amber-400'}">${d}d</div><div class="text-xs text-brand-muted">restantes</div></div>
    </div>`; }).join('')}</div></div>`:''}

  <div class="panel p-5 mb-5">
    <div class="flex flex-wrap gap-2 items-center">
      <span class="text-xs text-brand-muted uppercase tracking-wider mr-2">Filtros</span>
      <input id="prod-search-input" value="${escape(prodFilters.search)}" oninput="onProdSearchInput(this)" placeholder="Buscar OP / pedido / cliente / producto / asesor..." class="input-field w-80 text-xs">
      <select onchange="prodFilters.area=this.value; renderPage();" class="input-field w-auto text-xs">
        <option value="">Todas las áreas</option>
        ${PROD_AREAS.map(a=>`<option value="${a}" ${prodFilters.area===a?'selected':''}>${a}</option>`).join('')}
      </select>
      <select onchange="prodFilters.producto=this.value; renderPage();" class="input-field w-auto text-xs">
        <option value="">Todos los productos</option>
        ${state.products.map(p=>`<option value="${p.id}" ${prodFilters.producto===p.id?'selected':''}>${escape(p.name)}</option>`).join('')}
      </select>
      <select onchange="prodFilters.asesor=this.value; renderPage();" class="input-field w-auto text-xs">
        <option value="">Todos los asesores</option>
        ${LEAD_ASESORES.map(a=>`<option value="${escape(a)}" ${prodFilters.asesor===a?'selected':''}>${escape(a)}</option>`).join('')}
      </select>
      <select onchange="const [c,d]=this.value.split('|'); prodFilters.sortBy=c; prodFilters.sortDir=d; renderPage();" class="input-field w-auto text-xs">
        <option value="orderDate|desc" ${prodFilters.sortBy==='orderDate'&&prodFilters.sortDir==='desc'?'selected':''}>Inicio: + recientes</option>
        <option value="orderDate|asc" ${prodFilters.sortBy==='orderDate'&&prodFilters.sortDir==='asc'?'selected':''}>Inicio: + antiguas</option>
        <option value="vence|asc" ${prodFilters.sortBy==='vence'&&prodFilters.sortDir==='asc'?'selected':''}>Vence: más próximas</option>
        <option value="vence|desc" ${prodFilters.sortBy==='vence'&&prodFilters.sortDir==='desc'?'selected':''}>Vence: más lejanas</option>
        <option value="dias|asc" ${prodFilters.sortBy==='dias'&&prodFilters.sortDir==='asc'?'selected':''}>Días: menor a mayor</option>
        <option value="dias|desc" ${prodFilters.sortBy==='dias'&&prodFilters.sortDir==='desc'?'selected':''}>Días: mayor a menor</option>
        <option value="cliente|asc" ${prodFilters.sortBy==='cliente'&&prodFilters.sortDir==='asc'?'selected':''}>Cliente A→Z</option>
        <option value="cliente|desc" ${prodFilters.sortBy==='cliente'&&prodFilters.sortDir==='desc'?'selected':''}>Cliente Z→A</option>
        <option value="progreso|desc" ${prodFilters.sortBy==='progreso'&&prodFilters.sortDir==='desc'?'selected':''}>Progreso mayor → menor</option>
        <option value="progreso|asc" ${prodFilters.sortBy==='progreso'&&prodFilters.sortDir==='asc'?'selected':''}>Progreso menor → mayor</option>
      </select>
      ${(prodFilters.area||prodFilters.producto||prodFilters.search||prodFilters.asesor)?`<button onclick="prodFilters={area:'',producto:'',search:'',asesor:'',sortBy:'orderDate',sortDir:'desc'}; renderPage();" class="text-xs text-red-300 hover:underline">Limpiar</button>`:''}
    </div>
  </div>

  <div class="flex justify-between items-center mb-3">
    <h3 class="font-semibold gold-title">Tablero por área de producción <span class="text-xs text-brand-muted">(${active.length} OPs activas)</span></h3>
    <div class="flex gap-1 text-[11px]">
      <button onclick="prodBoardMode='cards'; renderPage();" class="${prodBoardMode==='cards'?'btn-gold':'btn-outline'} py-1 px-2">📇 Tarjetas</button>
      <button onclick="prodBoardMode='compact'; renderPage();" class="${prodBoardMode==='compact'?'btn-gold':'btn-outline'} py-1 px-2">📋 Compacto</button>
      <button onclick="prodBoardMode='heatmap'; renderPage();" class="${prodBoardMode==='heatmap'?'btn-gold':'btn-outline'} py-1 px-2">🌡 Heatmap</button>
    </div>
  </div>
  ${(()=>{
    const sortByDue = arr => arr.slice().sort((a,b)=>(a.dueDate||'').localeCompare(b.dueDate||''));
    if (prodBoardMode === 'heatmap') {
      // Vista heatmap: una sola fila con conteo + barra de saturación por área
      const max = Math.max(1, ...PROD_AREAS.map(a=>byArea[a].length));
      return `<div class="panel p-4 mb-6"><div class="grid grid-cols-1 gap-2">${PROD_AREAS.map(a=>{
        const n = byArea[a].length;
        const urgentes = byArea[a].filter(o=>o.dueDate && daysBetween(today(),o.dueDate)<=3).length;
        const pct = Math.round((n/max)*100);
        const heat = n===0?'#1f2937':n<=5?'#10b981':n<=15?'#f59e0b':n<=40?'#ef4444':'#7f1d1d';
        return `<div class="flex items-center gap-3" onclick="prodFilters.area='${a}'; renderPage();" style="cursor:pointer">
          <div class="w-32 text-xs uppercase text-brand-muted truncate">${a}</div>
          <div class="flex-1 h-7 rounded overflow-hidden relative" style="background:#1a2940">
            <div class="h-full" style="width:${pct}%;background:${heat};opacity:0.8"></div>
            <div class="absolute inset-0 flex items-center justify-between px-3 text-[11px] font-semibold">
              <span class="text-white">${n} OPs ${urgentes>0?`<span class="badge-danger px-1 rounded ml-1">⚠ ${urgentes} urgentes</span>`:''}</span>
              <span class="text-white/80">${pct}%</span>
            </div>
          </div>
        </div>`; }).join('')}</div>
        <div class="text-[10px] text-brand-muted mt-3 italic">Clic en un área para filtrar la tabla de detalle abajo. Verde=baja carga · Amarillo=media · Rojo=saturado.</div>
      </div>`;
    }
    if (prodBoardMode === 'compact') {
      // Vista lista compacta: solo IDs + cliente, ordenado por vencimiento
      return `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 mb-6">${PROD_AREAS.map(a=>{
        const sorted = sortByDue(byArea[a]);
        const overflow = sorted.length > 12 ? sorted.length - 12 : 0;
        return `<div class="panel p-3">
          <div class="flex justify-between items-center mb-2">
            <h4 class="text-xs uppercase gold-title">${a}</h4>
            <span class="text-xs ${byArea[a].length>20?'text-red-400 font-bold':byArea[a].length>10?'text-amber-300':'text-brand-muted'}">${byArea[a].length}</span>
          </div>
          <div class="space-y-0.5">${sorted.slice(0,12).map(o=>{ const d=o.dueDate?daysBetween(today(),o.dueDate):null; const c=d===null?'#8A9BB8':d<=3?'#ef4444':d<=7?'#f59e0b':'#10b981';
            return `<div class="flex justify-between items-center text-[11px] py-0.5 border-b border-[#2A4061]/30">
              <span class="font-mono text-brand-gold">${o.id}</span>
              <span class="text-white truncate flex-1 px-2">${escape(o.clientName||'')}</span>
              ${d!==null?`<span style="color:${c}">${d<0?'-'+Math.abs(d):d}d</span>`:'<span class="text-brand-muted">—</span>'}
            </div>`; }).join('')||'<div class="text-[11px] text-brand-muted italic text-center py-2">—</div>'}
            ${overflow?`<div class="text-[10px] text-brand-muted italic text-center pt-1 cursor-pointer hover:text-brand-gold" onclick="prodFilters.area='${a}'; renderPage();">+${overflow} más → ver detalle</div>`:''}
          </div>
        </div>`; }).join('')}</div>`;
    }
    // Vista cards (default), pero con límite de 8 por columna y "ver más"
    return `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 mb-6">${PROD_AREAS.map(a=>{
      const sorted = sortByDue(byArea[a]);
      const visible = sorted.slice(0,8);
      const overflow = sorted.length - visible.length;
      return `<div class="panel p-3">
        <div class="flex justify-between items-center mb-3">
          <h4 class="text-xs uppercase gold-title">${a}</h4>

function cerrarOP(orderId) {
  const o = state.orders.find(x=>x.id===orderId); if (!o) return;
  if (o.area!=='Listo') { toast('La OP debe estar en área "Listo" para cerrarla','error'); return; }
  if (!confirm(`¿Cerrar OP ${orderId}? Solo una OP cerrada habilita crear producto en inventario.`)) return;
  o.opClosed = true;
  o.estado = 'op_cerrada';
  o.closedAt = nowISO();
  o.closedBy = state.currentUser?.name || 'Auditoría';
  save(); renderAll(); toast(`OP ${orderId} cerrada · habilitado ingreso a inventario`,'ok');
}

function solicitarCierreOP(orderId) {
  const o = state.orders.find(x=>x.id===orderId); if (!o) return;
  if (o.area!=='Listo') { toast('La OP debe estar en área "Listo" para solicitar cierre','error'); return; }
  if (o.closeRequested) { toast('Ya hay una solicitud de cierre pendiente','info'); return; }
  o.closeRequested = true;
  o.closeRequestedAt = nowISO();
  o.closeRequestedBy = state.currentUser?.name || 'Producción';
  pushNotification({ type:'warning', text:`🔔 Producción solicita cierre de OP ${o.id} (${escape(o.clientName||'')})`, link:'auditoria', key:`closeReq_${o.id}` });
  save(); renderAll(); toast(`Solicitud de cierre enviada a auditoría`,'ok');
}

function crearProductoInventario(orderId) {
  const o = state.orders.find(x=>x.id===orderId); if (!o) return;
  if (o.area!=='Listo') { toast('La OP debe estar en área "Listo"','error'); return; }
  if (!o.opClosed && o.estado!=='op_cerrada') { toast('Primero debes CERRAR la OP para habilitar el ingreso a inventario','error'); return; }
  const existing = (state.finishedStock||[]).find(f=>f.orderId===o.id && f.source==='produccion');
  if (existing) { toast('Ya existe ingreso para esta OP','info'); return; }
  const cedi = (state.warehouses||[]).find(w=>/CEDI|Central|Terminado/i.test(w.name) && w.tipo==='terminado') || state.warehouses.find(w=>w.tipo==='terminado') || state.warehouses?.[0];
  if (!cedi) { toast('No hay bodega configurada','error'); return; }
  state.finishedStock = state.finishedStock || [];
  state.finishedStock.unshift({
    id: uid('FS'),
    productId: o.productId,
    warehouseId: cedi.id,
    qty: o.qty||1,
    status: o.pedidoId?'reservado':'disponible',
    orderId: o.id,
    pedidoId: o.pedidoId||null,
    customerId: o.customerId||null,
    clientName: o.clientName||'',
    source: 'produccion',
    receptionStatus: 'pendiente_recepcion',
    readyDate: today(),
    notes: `Producción OP ${o.id}`
  });
  o.estado = 'listo';
  state.counters.mov = (state.counters.mov||0)+1;
  state.stockMoves = state.stockMoves || [];
  state.stockMoves.push({ id:'SM-'+state.counters.mov, orderId:o.id, pedidoId:o.pedidoId, productId:o.productId, qty:o.qty||1, type:'entrada_produccion', date:today(), warehouseId:cedi.id, reason:`Producción OP ${o.id}` });
  pushNotification({ type:'info', text:`Logística: verificar recepción OP ${o.id} en ${cedi.name}`, link:'inventarioTerminado', key:`recep_${o.id}` });
  save(); renderAll(); toast(`✓ Producto creado en ${cedi.name} — pendiente de recepción`,'ok');
}

function confirmarRecepcionCEDI(fsId) {
  const f = (state.finishedStock||[]).find(x=>x.id===fsId); if (!f) return;
  f.receptionStatus = 'recibido';
  f.receivedAt = today();
  f.receivedBy = state.currentUser?.name||'Logística';
  save(); renderPage(); toast('✓ Recepción confirmada','ok');
}

function updateOrderArea(id, area) {
  const o = state.orders.find(x=>x.id===id); if (!o) return;
  o.area = area || null;
  // Si se marca "Listo" automáticamente sincronizamos estado si el pedido seguía en producción
  if (area==='Listo' && o.estado==='produccion') o.estado='listo';
  save(); renderPage(); toast('Área actualizada','ok');
}

// Generate follow-up schedule (7d/6m/12m) for every delivered order that doesn't yet have a schedule
function ensureFollowupSchedule() {
  state.followups = state.followups || [];
  state.orders.filter(o=>o.estado==='despachado' || o.estado==='entregado').forEach(o => {
    const baseDate = o.deliveredAt || o.dueDate || o.orderDate || today();
    const milestones = [
      { code:'7d',  offsetDays:7,   label:'Seguimiento 1 semana' },
      { code:'6m',  offsetDays:180, label:'Seguimiento 6 meses' },
      { code:'12m', offsetDays:365, label:'Seguimiento 12 meses' }
    ];
    milestones.forEach(m => {
      const exists = state.followups.find(f => f.orderId===o.id && f.code===m.code);
      if (!exists) {
        state.followups.push({
          id: uid('FU'),
          orderId: o.id,
          customerId: o.customerId,
          clientName: o.clientName,
          asesor: o.asesor,
          code: m.code,
          label: m.label,
          dueDate: addDays(baseDate, m.offsetDays),
          status: 'pendiente',
          completedAt: null,
          completedBy: null,
          nps: null,
          notes: ''
        });
      }
    });
  });
}

function completeFollowup(fuId) {
  const f = (state.followups||[]).find(x=>x.id===fuId); if (!f) return;
  const notes = prompt('Notas del seguimiento:', '') || '';
  const npsIn = prompt('NPS 0-10 (opcional):', '');
  const nps = npsIn==='' ? null : Math.max(0, Math.min(10, +npsIn||0));
  f.status = 'completado';
  f.completedAt = today();
  f.completedBy = state.currentUser?.name || f.asesor;
  f.nps = nps;
  f.notes = notes;
  // Registrar también en el perfil del cliente
  const cust = state.customers.find(c=>c.id===f.customerId);
  if (cust) {
    cust.postSales = cust.postSales || [];
    cust.postSales.unshift({ id:uid('CPS'), orderId:f.orderId, code:f.code, label:f.label, date:today(), nps, notes, by:f.completedBy });
  }
  // Guardar también en historial global
  state.postSales.unshift({ id:uid('PS'), orderId:f.orderId, type:'seguimiento '+f.code, date:today(), nps, notes: `[${f.label}] ${notes}` });
  save(); renderPage(); toast('Seguimiento '+f.code+' registrado','ok');
}

function onGarInvoiceChange(sel) {
  const opt = sel.selectedOptions[0]; if (!opt) return;
  const cl = document.getElementById('gf-client'); if (cl) cl.value = opt.dataset.client||'';
  const ord = document.getElementById('gf-order'); if (ord) ord.value = opt.dataset.order||'';
  const custInput = document.getElementById('gf-customer');
  const custId = opt.dataset.cust||'';
  if (custInput) custInput.value = custId;
  const prodSel = document.getElementById('gf-product');
  if (!prodSel) return;
  // Buscar productos comprados por este cliente via orders (todas, no solo facturadas por si acaso)
  const orderIdsClient = state.orders.filter(o => (custId && o.customerId===custId) || (!custId && o.clientName===opt.dataset.client)).map(o=>o.productId).filter(Boolean);
  const invoiceOrderIds = (state.invoices||[]).filter(inv => (custId && inv.customerId===custId) || (!custId && inv.clientName===opt.dataset.client)).map(inv=>inv.orderId).filter(Boolean);
  const invoiceProdIds = invoiceOrderIds.map(oid => state.orders.find(o=>o.id===oid)?.productId).filter(Boolean);
  const uniqueIds = [...new Set([...orderIdsClient, ...invoiceProdIds])];
  const prods = uniqueIds.map(id => state.products.find(p=>p.id===id)).filter(Boolean);
  if (prods.length === 0) {
    prodSel.disabled = true;
    prodSel.innerHTML = '<option value="">— Cliente sin productos comprados —</option>';
  } else {
    prodSel.disabled = false;
    prodSel.innerHTML = '<option value="">— elegir —</option>' + prods.map(p=>`<option value="${p.id}">${escape(p.name)}</option>`).join('');
  }
}

function generarOpDesdeGarantia(warrantyId) {
  const w = state.warranties.find(x=>x.id===warrantyId); if (!w) return;
  if (w.estado!=='abierta') { toast('La OP sólo se genera cuando el caso está ABIERTO','error'); return; }
  if (w.generatedOpId) { toast('Ya existe OP '+w.generatedOpId+' para esta garantía','info'); return; }
  if (!confirm('¿Generar OP desde esta garantía? Los costos se cargarán manualmente.')) return;
  state.counters.op = (state.counters.op||5000)+1;
  const opId = 'OP-'+state.counters.op;
  const p = state.products.find(x=>x.id===w.productId);
  const areas = (p?.areas)||['Ebanistería','Listo'];
  state.orders.unshift({
    id: opId, pedidoId:null, quoteId:null, customerId:null, clientName: w.clientName,
    total:0, paid:0, tiempo:15, orderDate: today(), dueDate: addDays(today(),15),
    estado:'produccion', area: areas[0]||'Ebanistería', asesor: w.comercial||w.asesor||'',
    tipo:'garantia', verified:true, docType:'remisión',
    productId: w.productId, qty: +w.qty||1,
    garantiaId: w.id,
    costosManual: [], comment: `Garantía ${w.id} · Causal: ${w.causal||'—'} · ${w.motivo||''}`
  });
  w.generatedOpId = opId;
  save(); renderAll(); toast(`OP ${opId} creada desde ${w.id} · cargar costos manual`,'ok');
}

function cargarCostoGarantiaOp(warrantyId) {
  const w = state.warranties.find(x=>x.id===warrantyId); if (!w || !w.generatedOpId) { toast('Primero genera la OP','error'); return; }
  const concept = prompt('Concepto del costo (ej: Tela, Mano de obra, Espuma):');
  if (!concept) return;
  const amount = +prompt('Monto (COP):','0'); if (!amount || amount<=0) return;
  w.opCostos = w.opCostos || [];
  const ceId = 'WCE-' + (w.id||'') + '-' + (w.opCostos.length+1);
  const costEntry = { id: ceId, concept, description: concept, amount, source:'caja', at: nowISO(), date: today(), by: state.currentUser?.name||'—' };
  w.opCostos.push(costEntry);
  const o = state.orders.find(x=>x.id===w.generatedOpId);
  if (o) { o.costosManual = o.costosManual||[]; o.costosManual.push({ concept, amount, at:nowISO() }); o.total = (o.total||0) + amount; }

  // Hook contable Fase 3 (#16) — costo de garantía
  safeAccountingHook('postWarrantyCost', w, costEntry);

  save(); renderAll(); toast(`Costo "${concept}" · ${fmtCOP(amount)} agregado`,'ok');
}

function updateWarrantyField(id, field, value) {
  const w = state.warranties.find(x=>x.id===id); if (!w) return;
  w[field] = value;
  save(); renderPage();
  if (field==='estado') toast(`${w.id} → ${value}`,'ok');
}

function attachWarrantyPhoto(id) {
  const w = state.warranties.find(x=>x.id===id); if (!w) return;
  const filename = prompt('Nombre del archivo de foto (mock):', 'evidencia-'+(((w.fotos||[]).length)+1)+'.jpg');
  if (!filename) return;
  w.fotos = w.fotos || [];
  w.fotos.push({ filename, size:(Math.random()*4+0.5).toFixed(2)+' MB', uploadedAt: nowISO() });
  save(); openWarrantyDetail(id); toast('Foto adjuntada','ok');
}

function removeWarrantyPhoto(id, idx) {
  const w = state.warranties.find(x=>x.id===id); if (!w) return;
  (w.fotos||[]).splice(idx,1);
  save(); openWarrantyDetail(id);
}

function addWarrantyComm(id, form) {
  const w = state.warranties.find(x=>x.id===id); if (!w) return;
  const d = Object.fromEntries(new FormData(form).entries());
  w.comunicaciones = w.comunicaciones || [];
  w.comunicaciones.unshift({ at: nowISO(), by: (state.currentUser && state.currentUser.name) || 'Comercial', via: d.via, texto: d.texto });
  save(); openWarrantyDetail(id); toast('Comunicación registrada','ok');
}

        : 'DB 417505 (Devoluciones) / CR 130505 (Crédito a cliente)'}
      ${inv.orderId ? '<br>+ Reverso parcial COGS: DB 143005 / CR 612035' : ''}
    </div>

  </form>`;
  showModal('modal-nc', html);
}
function onEmitirNC(invoiceId, form) {
  const tipo = form.querySelector('#nc-tipo').value;
  const motivo = form.querySelector('#nc-motivo').value.trim();
  if (!motivo) { toast('Motivo requerido','error'); return; }
  let items = [];
  if (tipo === 'parcial') {
    const monto = +form.querySelector('#nc-monto').value || 0;
    if (monto <= 0) { toast('Monto inválido','error'); return; }
    items = [{ amount: monto }];
  }
  if (typeof emitNotaCredito !== 'function') { toast('Motor NC no disponible','error'); return; }
  const r = emitNotaCredito(invoiceId, motivo, items);
  if (r.error) { toast('Error: '+(r.message||r.error), 'error'); return; }
  if (r.warning) { toast('Aviso: '+r.warning, 'warn'); }
  closeModal('modal-nc');
  if (r.ok) toast(`NC ${r.ncNumber} emitida · ${fmtCOP(r.monto)}`, 'ok');
  if (typeof renderPage==='function') renderPage();
}

function emitirDocClienteParcial(form, customerId, clientName) {
  const fd = new FormData(form);
  const type = fd.get('type');
  const ivaRuleId = fd.get('ivaRuleId') || (type==='factura'?'IVA-19':'IVA-0');
  const applyClientRet = !!fd.get('applyClientRet');
  const reqIds = fd.getAll('req[]');
  if (!reqIds.length) { toast('Selecciona al menos una OP','error'); return; }
  const reqs = (state.invoiceRequests||[]).filter(r=>reqIds.includes(r.id));
  const amount = reqs.reduce((a,r)=>{ const o=state.orders.find(x=>x.id===r.orderId); return a+(o?.total||r.amount||0); },0);
  const kind = type==='factura' ? 'FAC' : 'REM';
  let id, docNumber = null;
  if (typeof nextDocNumber === 'function') {
    const nr = nextDocNumber(kind);
    if (nr && nr.ok) { id = nr.id; docNumber = nr.number; }
  }
  if (!id) {
    const num = state.invoices.filter(i=>i.type===type).length+1;
    id = `${kind}-${String(num).padStart(3,'0')}`;
  }
  const cust = state.customers.find(c=>c.id===customerId);
  state.invoices.unshift({
    id, type, clientName, customerId,
    docNumber,
    orderIds: reqs.map(r=>r.orderId),
    orderId: reqs.map(r=>r.orderId).join(', '),
    nit: cust?.doc||'—', amount,
    emitDate: today(),
    dueDate: type==='factura' ? addDays(today(),15) : null,
    estado: type==='factura' ? 'pendiente' : 'entregada',
    // dianCufe = id consecutivo interno (compatibilidad visual)
    dianCufe: id,
    ivaRuleId, applyClientRet,
    parcial: reqs.length < (state.invoiceRequests||[]).filter(r=>(r.estado==='aprobada_auditoria'||r.estado==='aprobado') && r.customerId===customerId).length
  });
  reqs.forEach(r => {
    r.estado = 'emitida';
    r.invoiceId = id;
    const o = state.orders.find(x=>x.id===r.orderId);
    if (o) { o.estado='entregado'; o.invoiced = true; }
  });
  safeAccountingHook('postSale', state.invoices[0]);
  save(); closeModal('modal-facc'); renderAll(); toast(`${type==='factura'?'Factura':'Remisión'} ${id} emitida · ${fmtCOP(amount)}${reqs.length<(state.invoiceRequests||[]).filter(r=>r.customerId===customerId).length?' (parcial)':''}`,'ok');
}

        const bom = (p?.bom)||[];
        const bomValid = bom.length>0 && bom.every(b=>state.supplies.find(s=>s.id===b.supplyId));
        const costoUnit = bom.reduce((a,b)=>{const s=state.supplies.find(x=>x.id===b.supplyId); return a + (s?(+s.cost||0)*(+b.qty||0):0);}, 0) || (+p?.cost||0);
        const costoMaster = costoUnit * qty;
        const realCons = (state.supplyIssues||[]).filter(si=>(si.orderIds||[]).includes(o.id) && si.type!=='devolucion');
        const costoReal = realCons.reduce((a,si)=>a + (si.items||[]).reduce((b,it)=>{ const s=state.supplies.find(x=>x.id===it.supplyId); return b+(it.qty*(s?.cost||0)); },0), 0);
        const desv = costoMaster>0 ? Math.round(((costoReal-costoMaster)/costoMaster)*100) : 0;
        const aprobado = !!o.auditApproved;
        const opCerrada = o.opClosed || o.estado==='op_cerrada';
        const productoCreado = !!(state.finishedStock||[]).find(f=>f.orderId===o.id && f.source==='produccion');
        const closeReq = !!o.closeRequested;
        let estadoChip = '';
        if (aprobado) estadoChip = '<span class="badge-ok text-[11px] px-2 py-0.5 rounded">✓ Aprobada</span>';
        else if (productoCreado) estadoChip = '<span class="badge-gold text-[11px] px-2 py-0.5 rounded">📦 En CEDI</span>';
        else if (opCerrada) estadoChip = '<span class="badge-info text-[11px] px-2 py-0.5 rounded">🔒 OP cerrada</span>';
        else if (closeReq) estadoChip = '<span class="badge-warn text-[11px] px-2 py-0.5 rounded">🔔 Solicita cierre</span>';
        else estadoChip = '<span class="text-[11px] text-brand-muted italic">Pendiente</span>';
        return `
        <tr class="table-row" ondblclick="openAuditCloseDetail('${o.id}')">
          <td class="px-3 py-3 font-mono text-xs text-brand-gold font-semibold">${o.id}</td>
          <td class="px-3 py-3 text-white">${escape(o.clientName)}</td>
          <td class="px-3 py-3 text-xs text-white">${p?escape(p.name):'—'} <span class="text-brand-muted">×${qty}</span></td>
          <td class="px-3 py-3 text-right text-brand-gold-light">${fmtCOP(o.total)}</td>
          <td class="px-3 py-3 text-right text-white">${fmtCOP(costoMaster)}</td>
          <td class="px-3 py-3 text-right ${costoReal>costoMaster*1.15?'text-red-400':costoReal>costoMaster*1.05?'text-amber-400':'text-emerald-400'}">${fmtCOP(costoReal)}</td>
          <td class="px-3 py-3 text-right font-semibold ${Math.abs(desv)>15?'text-red-400':Math.abs(desv)>5?'text-amber-400':'text-emerald-400'}">${desv>0?'+':''}${desv}%</td>
          <td class="px-3 py-3">${estadoChip}</td>
          <td class="px-3 py-3 text-right">
            <div class="flex flex-col gap-1 items-end">
              <button onclick="openAuditCloseDetail('${o.id}')" class="btn-outline text-[11px] py-1 px-2">👁 Ver (consumos · editar · cerrar)</button>
              ${opCerrada && !productoCreado
                ? `<button onclick="auditoriaCrearProductoCEDI('${o.id}')" class="btn-outline text-[11px] py-1 px-2" style="border-color:#10b981;color:#6ee7b7">📥 Crear producto en CEDI</button>`
                : productoCreado ? `<span class="text-[10px] text-emerald-300">✓ Producto en CEDI</span>` : ''}
              ${productoCreado && !aprobado
                ? `<button onclick="auditApproveOp('${o.id}')" class="btn-gold text-[11px] py-1 px-2" style="background:#3b82f6">🧾 Aprobado para facturar</button>`
                : aprobado ? `<span class="text-[10px] text-blue-300">✓ Listo contabilidad</span>` : ''}
            </div>
          </td>
        </tr>`; }).join('') : '<tr><td colspan="9" class="text-center py-5 text-brand-muted italic text-xs">Sin OPs listas para auditoría</td></tr>'}</tbody>
    </table>
  </div>
  `;
};

function auditoriaCrearProductoCEDI(orderId) {
  const o = state.orders.find(x=>x.id===orderId); if (!o) { toast('OP no encontrada','error'); return; }
  if (!(o.opClosed || o.estado==='op_cerrada' || o.estado==='listo' || o.estado==='facturado')) {
    toast('Primero cierra la OP desde el modal "Ver"','error'); return;
  }
  // Resolver productId: directo, desde quote item, o desde innovation
  let productId = o.productId;
  if (!productId && o.innovationId) {
    const inn = (state.innovation||[]).find(x=>x.id===o.innovationId);
    if (inn?.productId) productId = inn.productId;
  }
  if (!productId && o.quoteId) {
    const qu = state.quotes.find(x=>x.id===o.quoteId);
    if (qu?.items?.[0]?.productId) productId = qu.items[0].productId;
  }
  if (!productId) {
    toast('La OP no tiene producto asociado. Si es innovación, primero usa "Crear producto definitivo".','error');
    return;
  }

  const existing = (state.finishedStock||[]).find(f=>f.orderId===o.id && f.source==='produccion');
  if (existing) { toast('Ya existe el producto en CEDI para esta OP (estado: '+(existing.receptionStatus||'recibido')+')','info'); return; }

  // SIEMPRE en CEDI - es la bodega central. Estado inicial: pendiente_recepcion
  const cedi = (state.warehouses||[]).find(w=>w.id==='W-CEDI')
            || (state.warehouses||[]).find(w=>/CEDI/i.test(w.code||w.name||''));
  if (!cedi) { toast('No hay bodega CEDI configurada','error'); return; }

  // Clasificar: si tiene pedido/cliente → "clientes (pendiente despacho)", si no → "stock castor"
  const hasCustomer = !!(o.pedidoId || o.customerId);
  const classification = hasCustomer ? 'clientes' : 'stock_castor';

  state.finishedStock = state.finishedStock || [];
  const fsId = uid('FS');
  state.finishedStock.unshift({
    id: fsId,
    productId,
    warehouseId: cedi.id,            // ← garantizado en CEDI
    qty: o.qty||1,
    status: hasCustomer ? 'reservado' : 'disponible',
    orderId: o.id,
    pedidoId: o.pedidoId||null,
    customerId: o.customerId||null,
    clientName: o.clientName||'',
    source: 'produccion',
    classification,                  // 'clientes' o 'stock_castor'
    receptionStatus: 'pendiente_recepcion',  // hasta que logística verifique
    requestedAt: today(),
    requestedBy: state.currentUser?.name||'Auditoría',
    readyDate: null,                 // se setea cuando logística verifica
    notes: `Producción OP ${o.id} · Pendiente verificación de recepción en ${cedi.name}`
  });

  o.cediRequestedAt = today();
  o.cediClassification = classification;
  state.counters.mov = (state.counters.mov||0)+1;
  state.stockMoves = state.stockMoves || [];
  state.stockMoves.push({
    id:'SM-'+state.counters.mov,
    orderId:o.id, pedidoId:o.pedidoId, productId,
    qty:o.qty||1, type:'entrada_produccion_pendiente',
    date:today(), warehouseId:cedi.id,
    reason:`Producción OP ${o.id} · pendiente verificación logística en ${cedi.name}`,
    by: state.currentUser?.name||'Auditoría'
  });

  // Notificación específica al inventario terminado para que verifiquen recepción
  const prodMaster = state.products.find(p=>p.id===productId);
  pushNotification({
    type:'warning',
    text:`📦 Verificar recepción: ${prodMaster?.name||'Producto'} (OP ${o.id}) llegando a ${cedi.name} · ${hasCustomer?'reserva cliente '+(o.clientName||''):'stock libre'}`,
    link:'inventario',
    key:`recep_${o.id}`
  });

  // Hook contable Fase 3 (#12) — entrada de Producto Terminado
  safeAccountingHook('postFinishedGoods', state.finishedStock[0]);

  save(); renderAll();
  toast(`📨 Solicitud enviada a inventario terminado para verificar recepción en ${cedi.name}`,'ok');
}

// Logística verifica que el producto llegó físicamente al CEDI
function verifyCEDIReception(finishedStockId) {
  const f = (state.finishedStock||[]).find(x=>x.id===finishedStockId); if (!f) return;
  if (f.receptionStatus === 'recibido') { toast('Ya estaba marcado como recibido','info'); return; }
  f.receptionStatus = 'recibido';
  f.readyDate = today();
  f.receivedBy = state.currentUser?.name || 'Logística';
  f.receivedAt = nowISO();

  // Sumar al stock maestro del producto
  const prodMaster = state.products.find(p=>p.id===f.productId);
  if (prodMaster) {
    prodMaster.stock = (prodMaster.stock||0) + (f.qty||1);
    if (!prodMaster.warehouseId) prodMaster.warehouseId = f.warehouseId;
  }
  // Marcar la OP como "listo"
  const o = state.orders.find(x=>x.id===f.orderId);
  if (o) o.estado = 'listo';
  // Convertir el movimiento pendiente en entrada definitiva
  const mv = (state.stockMoves||[]).find(m=>m.orderId===f.orderId && m.type==='entrada_produccion_pendiente');
  if (mv) { mv.type = 'entrada_produccion'; mv.verifiedAt = today(); mv.verifiedBy = f.receivedBy; }

  pushNotification({
    type:'info',
    text:`✓ Recepción verificada: ${prodMaster?.name||'Producto'} en CEDI (${f.classification==='clientes'?'reservado para '+(f.clientName||'cliente'):'stock libre'})`,
    link:'inventario',
    key:`recVer_${f.id}`
  });
  save(); renderPage();
  toast(`✓ Producto verificado y disponible en CEDI · ${f.classification==='clientes'?'Pestaña Clientes':'Pestaña Stock Castor'}`,'ok');
}

function auditApproveOp(orderId) {
  const o = state.orders.find(x=>x.id===orderId); if (!o) return;
  o.auditApproved = true;
  o.auditApprovedBy = state.currentUser?.name||'Auditoría';
  o.auditApprovedAt = nowISO();
  // Crea una solicitud para contabilidad
  state.invoiceRequests = state.invoiceRequests || [];
  state.counters.ireq = (state.counters.ireq||0)+1;
  state.invoiceRequests.unshift({
    id: 'IREQ-'+state.counters.ireq,
    orderId: o.id, pedidoId: o.pedidoId, customerId: o.customerId, clientName: o.clientName,
    docType: o.docType||'factura', amount: o.total,
    estado: 'aprobada_auditoria', requestedAt: nowISO(), requestedBy: 'Auditoría'
  });
  pushNotification({ type:'info', text:`OP ${o.id} aprobada por auditoría — lista para facturar/remisionar`, targetUser:'Yolanda Reyes', link:'contabilidad', key:'auditApr-'+o.id });
  save(); renderAll(); toast(`OP ${o.id} aprobada por auditoría — Contabilidad puede facturar`,'ok');
}

function saveStockOrder(form) {
  const d = Object.fromEntries(new FormData(form).entries());
  const p = state.products.find(x=>x.id===d.productId); if (!p) { toast('Producto no encontrado','error'); return; }
  const qty = +d.qty||1;
  state.counters.op = (state.counters.op||5000)+1;
  const opId = 'OP-'+state.counters.op;
  const total = (+p.price||0)*qty;
  const newOp = {
    id: opId, productId: p.id, qty,
    clientName: 'Castor (stock interno)',
    customerId: null,
    tipo: 'stock',
    estado: 'produccion',
    area: (p.areas||[])[0] || 'Ebanistería',
    verified: true,
    orderDate: today(),
    dueDate: addDays(today(), +d.tiempo||20),
    tiempo: +d.tiempo||20,
    asesor: d.asesor,
    total, paid: 100,
    notas: d.notas||'',
    docType: 'remisión'
  };
  state.orders.unshift(newOp);
  save(); closeModal('modal-stock'); renderPage(); toast(`${opId} creada para stock Castor`,'ok');
}

function rejectProductForInnovation(id) {
  const p = state.products.find(x=>x.id===id); if (!p) return;
