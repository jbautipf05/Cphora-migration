function closeOpAndInvoice(orderId, type, opts) {
  const o = state.orders.find(x=>x.id===orderId); if (!o) return;
  o.estado = 'entregado';
  o.invoiced = true;
  const kind = type==='factura' ? 'FAC' : 'REM';
  // Numeración consecutiva interna vía nextDocNumber (sin pretensión DIAN)
  let id, docNumber = null;
  if (typeof nextDocNumber === 'function') {
    const nr = nextDocNumber(kind);
    if (nr && nr.ok) { id = nr.id; docNumber = nr.number; }
  }
  if (!id) {
    const num = state.invoices.filter(i=>i.type===type).length+1;
    id = `${kind}-${String(num).padStart(3,'0')}`;
  }
  const cust = state.customers.find(c=>c.id===o.customerId);
  state.invoices.unshift({
    id, orderId, type,
    docNumber,
    clientName: o.clientName,
    customerId: o.customerId,
    nit: cust?.doc||'—',
    amount: o.total,
    emitDate: today(),
    dueDate: type==='factura' ? addDays(today(),15) : null,
    estado: type==='factura' ? 'pendiente' : 'entregada',
    // dianCufe se mantiene por compatibilidad visual: igual al docNumber/id consecutivo
    dianCufe: id,
    ivaRuleId: opts?.ivaRuleId || (type==='factura'?'IVA-19':'IVA-0'),
    applyClientRet: !!opts?.applyClientRet
  });
  safeAccountingHook('postSale', state.invoices[0]);
  save(); renderPage(); toast(`${type==='factura'?'Factura':'Remisión'} ${id} generada`,'ok');
}

function auditCreateOp(orderId) {
  const o = state.orders.find(x=>x.id===orderId); if (!o) return;
  const comment = (document.getElementById('audit-order-comment')?.value||'').trim();
  if (comment) { o.auditComment = comment; (o.auditEdits=o.auditEdits||[]).push({ at:nowISO(), by:state.currentUser?.name||'Auditoría', note:'comentario al crear OP' }); }
  o.opRejected = false;
  o.opRejectedReason = null;
  closeModal('modal-audit-detail');
  verifyOrderOP(orderId);
}

function auditRejectOp(orderId) {
  const o = state.orders.find(x=>x.id===orderId); if (!o) return;
  const reason = (document.getElementById('audit-order-comment')?.value||'').trim();
  if (!reason) { toast('Escribe el motivo del rechazo en el comentario','error'); return; }
  o.opRejected = true;
  o.opRejectedReason = reason;
  o.opRejectedBy = state.currentUser?.name||'Auditoría';
  o.opRejectedAt = nowISO();
  o.auditComment = reason;
  (o.auditEdits=o.auditEdits||[]).push({ at:nowISO(), by:state.currentUser?.name||'Auditoría', note:'rechazo: '+reason });
  pushNotification({ type:'warning', text:`✗ Auditoría rechazó ${o.id}: ${reason.slice(0,60)}${reason.length>60?'…':''}`, targetUser:o.asesor, link:'ventas', key:`rej_${o.id}` });
  save(); closeModal('modal-audit-detail'); renderAll(); toast('Pedido rechazado — comercial notificado','ok');
}

function saveCorrectRejectedOp(orderId, form) {
  const o = state.orders.find(x=>x.id===orderId); if (!o) return;
  const d = Object.fromEntries(new FormData(form).entries());
  if (d.clientName) o.clientName=d.clientName;
  if (d.productId) o.productId=d.productId;
  if (+d.qty) o.qty=+d.qty;
  if (+d.total) o.total=+d.total;
  if (+d.tiempo) o.tiempo=+d.tiempo;
  if (d.deliveryAddress) o.deliveryAddress=d.deliveryAddress;
  o.opRejected = false;
  (o.auditEdits=o.auditEdits||[]).push({ at:nowISO(), by:state.currentUser?.name||o.asesor||'Comercial', note:'corrección tras rechazo: '+(d.responseNote||'') });
  pushNotification({ type:'info', text:`${o.id} corregido por ${o.asesor||'comercial'} — pendiente re-verificación`, link:'auditoria', key:`recorr_${o.id}_${Date.now()}` });
  save(); closeModal('modal-correct-op'); renderAll(); toast(`${o.id} corregido y reenviado a auditoría`,'ok');
}

function saveAuditEditOrder(orderId, form) {
  const o = state.orders.find(x=>x.id===orderId); if (!o) return;
  const d = Object.fromEntries(new FormData(form).entries());
  const changes = [];
  if (d.clientName && d.clientName!==o.clientName) { changes.push(`cliente: "${o.clientName}"→"${d.clientName}"`); o.clientName=d.clientName; }
  if (d.productId && d.productId!==o.productId) { changes.push(`producto cambiado`); o.productId=d.productId; }
  if (+d.qty && +d.qty!==o.qty) { changes.push(`qty: ${o.qty}→${d.qty}`); o.qty=+d.qty; }
  if (+d.total && +d.total!==o.total) { changes.push(`total: ${o.total}→${d.total}`); o.total=+d.total; }
  if (+d.tiempo && +d.tiempo!==o.tiempo) { changes.push(`tiempo: ${o.tiempo}→${d.tiempo}`); o.tiempo=+d.tiempo; }
  if (d.deliveryAddress && d.deliveryAddress!==o.deliveryAddress) { o.deliveryAddress=d.deliveryAddress; changes.push('dirección actualizada'); }
  if (d.auditComment) o.auditComment = d.auditComment;
  (o.auditEdits=o.auditEdits||[]).push({ at:nowISO(), by:state.currentUser?.name||'Auditoría', note:changes.join('; ')||'edición sin cambios' });
  save(); closeModal('modal-audit-edit'); renderAll(); toast(`OP ${o.id} editada por auditoría`,'ok');
}

function saveAuditConsumos(orderId, form) {
  const o = state.orders.find(x=>x.id===orderId); if (!o) return;
  const fd = new FormData(form);
  const changes = [];
  state.supplyIssues = state.supplyIssues || [];
  // Crear ajuste: para cada supply con nueva cantidad distinta a la sumada previa, crear issue ajuste
  const qty = +o.qty||1;
  const prev = {};
  (state.supplyIssues||[]).filter(si=>(si.orderIds||[]).includes(o.id)).forEach(si=>{
    (si.items||[]).forEach(it => { prev[it.supplyId] = (prev[it.supplyId]||0) + (si.type==='devolucion'? -it.qty : it.qty); });
  });
  const ajusteItems = [];
  fd.forEach((val, key) => {
    if (!key.startsWith('real_')) return;
    const sid = key.slice(5);
    const newQty = +val || 0;
    const prevQty = prev[sid] || 0;
    const delta = newQty - prevQty;
    if (Math.abs(delta) > 0.0001) {
      ajusteItems.push({ supplyId:sid, qty:Math.abs(delta), sign:delta>0?1:-1 });
      // actualizar stock del insumo (delta positivo = más consumo = menos stock)
      const s = state.supplies.find(x=>x.id===sid);
      if (s) { s.stock = Math.max(0, (s.stock||0) - delta); }
      changes.push(`${s?.name||sid}: ${prevQty}→${newQty}`);
    }
  });
  if (!ajusteItems.length) { toast('Sin cambios en consumos','info'); return; }
  state.counters.sisu = (state.counters.sisu||5000)+1;
  state.supplyIssues.unshift({
    id:'SI-'+state.counters.sisu,
    orderIds:[o.id],
    type:'ajuste_auditoria',
    date:today(),
    by:state.currentUser?.name||'Auditoría',
    items: ajusteItems.map(a=>({ supplyId:a.supplyId, qty:a.qty*a.sign })),
    notes:`Ajuste por auditoría: ${changes.join(' · ')}`
  });
  (o.auditEdits=o.auditEdits||[]).push({ at:nowISO(), by:state.currentUser?.name||'Auditoría', note:'ajuste consumos: '+changes.join('; ') });
  save(); closeModal('modal-audit-detail'); renderAll(); toast('Consumos actualizados · inventario de insumos ajustado','ok');
  openAuditCloseDetail(orderId);
}

function getProductLifecycle(p) {
  if (p.lifecycleStatus) return p.lifecycleStatus;
  // Default: si está verified → Activo, si no → Borrador
  return p.verified ? 'Activo' : 'Borrador';
}
function updateProductLifecycle(productId, newStatus) {
  const p = state.products.find(x=>x.id===productId); if (!p) return;
  p.lifecycleStatus = newStatus;
  if (newStatus === 'Activo' && !p.verified) {
    // Pasar a Activo requiere que esté verificado en auditoría
    p.lifecycleStatus = 'Borrador';
    toast('No se puede activar: producto pendiente de verificación de auditoría','error');
    save(); renderPage(); return;
  }
  save(); renderPage();
  toast(`Estado de ${p.name}: ${newStatus}`, newStatus==='Activo'?'ok':'info');
}

function saveNewProductFromInnov(form) {
  const fd = new FormData(form);
  const orderId = fd.get('orderId');
  const order = state.orders.find(x=>x.id===orderId);
  if (!order) { toast('Pedido no encontrado','error'); return; }
  const name = fd.get('name')?.trim();
  if (!name) { toast('Nombre requerido','error'); return; }
  const areas = fd.getAll('areas[]');
  const supIds = fd.getAll('bom_sup[]'); const qtys = fd.getAll('bom_qty[]');
  const bom = supIds.map((s,i)=>({ supplyId:s, qty:+qtys[i]||0 })).filter(b=>b.supplyId && b.qty>0);

  state.counters.prod++;
  const sku = fd.get('sku')?.trim() || `PRD-${String(state.counters.prod).padStart(3,'0')}`;
  const id = 'p'+(state.products.length+1);

  const price = +fd.get('price')||0;
  const cat = fd.get('category')||'Otros';
  const catOther = fd.get('categoryOther')||'';
  const finalCategory = (cat === 'Otros' && catOther.trim()) ? catOther.trim() : cat;
  const product = {
    id, sku, name,
    description: fd.get('description')||'',
    category: finalCategory,
    photo: fd.get('photo')||'📦',
    warehouseId: fd.get('warehouseId'),
    cost: +fd.get('cost')||0,
    price,
    stock: 0,
    min: +fd.get('min')||0,
    entryDate: today(),
    dimensions: { ancho:+fd.get('ancho')||0, alto:+fd.get('alto')||0, profundidad:+fd.get('profundidad')||0 },
    areas, bom,
    verified: false
  };
  state.products.push(product);

  const qty = order.productoPropuesto?.qty || 1;
  order.items = [{ type:'producto', productId:id, name, qty, price, discount:0, subtotal: qty*price, acabados:{} }];
  order.total = qty*price;
  order.tipo = 'produccion';
  order.estado = 'pendiente_op';
  order.productId = id;

  const innov = (state.innovation||[]).find(x=>x.id===order.innovationId);
  if (innov) { innov.estado = 'aprobado'; innov.productId = id; innov.approvedAt = today(); }

  pushNotification({ type:'info', text:`Producto ${name} creado desde innovación — OP ${orderId} liberada`, targetUser:order.asesor, link:{page:'ventas', id:orderId} });

  save(); closeModal('modal-np'); renderAll();
  toast(`Producto ${name} creado — OP ${orderId} en flujo normal`,'ok');
}

    <thead class="text-xs uppercase text-brand-muted"><tr><th class="px-3 py-3 text-left">ID</th><th class="px-3 py-3 text-left">Nombre</th><th class="px-3 py-3 text-left">Rol</th><th class="px-3 py-3 text-left">Área</th><th class="px-3 py-3 text-left">Email</th><th class="px-3 py-3 text-left">Contratación</th><th class="px-3 py-3 text-right">Salario</th><th class="px-3 py-3 text-left">Estado</th></tr></thead>
    <tbody>${state.employees.map(e=>`<tr class="table-row"><td class="px-3 py-3 font-mono text-xs">${e.id}</td><td class="px-3 py-3 text-white font-medium">${escape(e.name)}</td><td class="px-3 py-3 text-brand-muted">${escape(e.role)}</td><td class="px-3 py-3"><span class="badge-gold text-[11px] px-2 py-0.5 rounded">${escape(e.area)}</span></td><td class="px-3 py-3 text-xs text-brand-muted">${escape(e.email||'')}</td><td class="px-3 py-3 text-xs text-brand-muted">${fmtDate(e.hiredAt)}</td><td class="px-3 py-3 text-right text-brand-gold-light font-semibold">${fmtCOP(e.salario)}</td><td class="px-3 py-3"><span class="badge-${estadoBadge(e.estado)} text-[11px] px-2 py-0.5 rounded">${e.estado}</span></td></tr>`).join('')}</tbody>
  </table></div>
  `;
};
const RRHH_AREAS = ['Administrativo','Comercial','Ebanistería','Pintura','Preparación','Pintura electroestatica','Costura','Tapicería','Ensamble','Soldadura','Logística','Supernumerarios','Almacen'];
const RRHH_CONTRATOS = ['Indefinido','Obra labor','Termino fijo','Prestación de servicios'];
const RRHH_ESTADOS = ['activo','retirado','Vacaciones','Suspendido'];
const RRHH_SEXOS = ['Hombre','Mujer','Therian'];

function openEmployeeForm() {
  showModal('modal-emp', `<form onsubmit="event.preventDefault(); saveEmployee(this);" class="panel rounded-xl shadow-2xl w-full max-w-3xl p-6 max-h-[90vh] overflow-y-auto scrollbar-thin" style="background:#152943">
    <div class="flex justify-between mb-5"><h2 class="text-lg font-bold gold-title">Nuevo empleado</h2><button type="button" onclick="closeModal('modal-emp')" class="text-brand-muted text-2xl">×</button></div>
    <div class="grid grid-cols-3 gap-3">
      <div class="col-span-2"><label class="label">Nombre *</label><input name="name" required class="input-field"></div>
      <div><label class="label">CC *</label><input name="cc" required placeholder="Nº cédula" class="input-field"></div>
      <div><label class="label">Cargo *</label><input name="role" required placeholder="Ej: Operario, Asesor…" class="input-field"></div>
      <div><label class="label">Área *</label><select name="area" required class="input-field">${RRHH_AREAS.map(a=>`<option>${a}</option>`).join('')}</select></div>
      <div><label class="label">Sexo *</label><select name="sexo" required class="input-field">${RRHH_SEXOS.map(s=>`<option>${s}</option>`).join('')}</select></div>
      <div><label class="label">Celular *</label><input name="celular" required class="input-field"></div>
      <div class="col-span-2"><label class="label">Dirección</label><input name="direccion" class="input-field"></div>
      <div><label class="label">Ciudad</label><input name="ciudad" class="input-field"></div>
      <div><label class="label">Fecha de nacimiento</label><input name="fechaNacimiento" type="date" class="input-field"></div>
      <div><label class="label">Fecha de ingreso *</label><input name="hiredAt" type="date" required value="${today()}" class="input-field"></div>
      <div><label class="label">Fecha de retiro</label><input name="fechaRetiro" type="date" class="input-field"></div>
      <div><label class="label">Tipo de contrato *</label><select name="tipoContrato" required class="input-field">${RRHH_CONTRATOS.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div><label class="label">ARL</label><input name="arl" class="input-field" placeholder="Ej: Sura, Positiva..."></div>
      <div><label class="label">Fondo de pensión</label><input name="fondoPension" class="input-field" placeholder="Ej: Colpensiones, Porvenir..."></div>
      <div><label class="label">EPS (Salud)</label><input name="salud" class="input-field" placeholder="Ej: Sura, Sanitas..."></div>
      <div><label class="label">Caja de compensación</label><input name="cajaCompensacion" class="input-field" placeholder="Ej: Compensar, Cafam..."></div>
      <div><label class="label">Estado *</label><select name="estado" required class="input-field">${RRHH_ESTADOS.map(e=>`<option>${e}</option>`).join('')}</select></div>
      <div><label class="label">Salario *</label><input name="salario" type="number" min="0" required value="0" class="input-field"></div>
      <div><label class="label">Bono</label><input name="bono" type="number" min="0" value="0" class="input-field"></div>
      <div><label class="label">Lugar de trabajo</label><input name="lugarTrabajo" class="input-field" placeholder="Ej: Bogotá · Calle 43"></div>
      <div class="col-span-3"><label class="label">Email</label><input name="email" type="email" class="input-field"></div>
    </div>
    <div class="flex justify-end gap-2 mt-5"><button type="button" onclick="closeModal('modal-emp')" class="btn-outline">Cancelar</button><button type="submit" class="btn-gold">Crear</button></div>
  </form>`);
}
function saveEmployee(form) {
  const d = Object.fromEntries(new FormData(form).entries());
  state.counters.emp++;
  state.employees.push({
    id:'E-'+String(state.counters.emp).padStart(3,'0'),
    name:d.name, cc:d.cc, role:d.role, area:d.area, sexo:d.sexo,
    celular:d.celular, direccion:d.direccion, ciudad:d.ciudad,
    fechaNacimiento:d.fechaNacimiento, hiredAt:d.hiredAt, fechaRetiro:d.fechaRetiro,
    tipoContrato:d.tipoContrato, arl:d.arl, fondoPension:d.fondoPension,
    salud:d.salud, cajaCompensacion:d.cajaCompensacion, estado:d.estado||'activo',
    salario:+d.salario||0, bono:+d.bono||0, lugarTrabajo:d.lugarTrabajo,
    email:d.email
  });
  save(); closeModal('modal-emp'); renderAll(); toast('Empleado agregado','ok');
}

/* ---------- QUICK CREATE ---------- */

  showModal('modal-quick-create', `<div class="panel rounded-xl shadow-2xl w-full max-w-md p-6" style="background:#152943">
    <div class="flex justify-between mb-5"><h2 class="text-lg font-bold gold-title">Crear nuevo</h2><button onclick="closeModal('modal-quick-create')" class="text-brand-muted text-2xl">×</button></div>
    <div class="grid grid-cols-2 gap-2">
      <button onclick="closeModal('modal-quick-create'); openLeadForm();" class="btn-outline text-left">👤 Lead</button>

      <button onclick="closeModal('modal-quick-create'); openWarrantyForm();" class="btn-outline text-left">🛡 Garantía</button>

      <button onclick="closeModal('modal-quick-create'); openFinishedForm();" class="btn-outline text-left">✓ Terminado</button>
      <button onclick="closeModal('modal-quick-create'); openEmployeeForm();" class="btn-outline text-left">🧑 Empleado</button>
      <button onclick="closeModal('modal-quick-create'); openBankForm();" class="btn-outline text-left">🏦 Cuenta bancaria</button>
      <button onclick="closeModal('modal-quick-create'); openPostSaleForm();" class="btn-outline text-left">📞 Postventa</button>

  </div>`);
}

/* ---------- GLOBAL SEARCH ---------- */
$('#global-search').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase(); if (!q) return;
  if (q.startsWith('l-') || q.match(/\bleads?\b/)) { go('leads'); leadFilters.search=q; renderPage(); }
  else if (q.startsWith('cot')) { go('cotizaciones'); quoteFilters.search=q; renderPage(); }
  else if (q.startsWith('ped')) { go('ventas'); orderFilters.search=q; renderPage(); }
});

migrateLegacy();
checkFollowupNotifications();
checkPendingSalesNotifications();
renderAll();
_initSb();
migrateLocalToCloud().then(() => syncFromCloud());
/* v6 */
</script>
