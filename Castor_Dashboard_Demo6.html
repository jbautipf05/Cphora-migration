<script>
const $ = (s,r=document) => r.querySelector(s);
const $$ = (s,r=document) => [...r.querySelectorAll(s)];
const uid = (p='id') => p+'-'+Math.random().toString(36).slice(2,9);
const today = () => new Date().toISOString().slice(0,10);
const nowISO = () => new Date().toISOString();
const fmtCOP = n => new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(n||0);
const fmtNum = n => new Intl.NumberFormat('es-CO').format(n||0);
const fmtDate = d => { if(!d) return '—'; return new Date(d).toLocaleDateString('es-CO',{year:'numeric',month:'short',day:'numeric'}); };
const fmtDateTime = d => { if(!d) return '—'; return new Date(d).toLocaleString('es-CO',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); };
const daysBetween = (a,b) => Math.floor((new Date(b)-new Date(a))/(1000*60*60*24));
const addDays = (d,n) => { const dt=new Date(d); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10); };
const escape = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const STORAGE_KEY = 'castor_cphora_v5';
const PROD_AREAS = ['Programación','Ebanistería','Preparación y pintura','Metal mecánica','Pintura electrostática','Tapicería','Tejido','Ensamble','Listo'];
const PRODUCT_CATEGORIES = ['Sillas','Mesas de comedor','Sofás','Butacas','Complementos','Camas','Nocheros','Escritorios','Exterior','Colchones','Accesorios','Tapetes','Otros'];
const PRODUCT_LIFECYCLE_STATES = ['Activo','Borrador','Proceso','Inactivo'];
function isProductActiveForSale(p) {
  if (!p) return false;
  const lc = p.lifecycleStatus || (p.verified ? 'Activo' : 'Borrador');
  return lc === 'Activo' && p.verified;
}

/* ---------- Helper genérico de ordenamiento por encabezado ---------- */
function applySort(arr, by, dir, columns) {
  if (!by) return arr;
  const col = columns[by];
  if (!col) return arr;
  const sign = dir === 'asc' ? 1 : -1;
  return arr.slice().sort((a,b) => {
    const va = col(a), vb = col(b);
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'number' && typeof vb === 'number') return (va - vb) * sign;
    return String(va).localeCompare(String(vb), 'es', {numeric:true}) * sign;
  });
}
function sortHeader(label, key, sortState, onSort) {
  const arrow = sortState.by === key
    ? (sortState.dir === 'asc' ? ' <span class="text-brand-gold">↑</span>' : ' <span class="text-brand-gold">↓</span>')
    : ' <span class="text-brand-muted/40">↕</span>';
  return `<th class="px-3 py-3 text-left cursor-pointer select-none hover:text-brand-gold-light" onclick="${onSort}('${key}')" title="Ordenar por ${label}">${label}${arrow}</th>`;
}
function toggleSort(state, key) {
  if (state.by === key) state.dir = state.dir === 'asc' ? 'desc' : 'asc';
  else { state.by = key; state.dir = 'asc'; }
}

// ── SUPABASE ────────────────────────────────────────────────────────────────
// ⚠️  CREDENCIALES: actualiza los dos valores de abajo con tu proyecto.
//
//  SB_URL      →  Project Settings → API → "Project URL"
//                 Debe tener formato:  https://abcdefghijk.supabase.co
//
//  SB_ANON_KEY →  Project Settings → API → "anon public"
//                 Debe ser un JWT largo que empieza con: eyJhbGc...
//
//  ⚠️  Las credenciales pegadas actualmente son incorrectas (ambas iguales
//      y sin formato https://). El app sigue funcionando con localStorage
//      hasta que corrijas estos valores.
// ───────────────────────────────────────────────────────────────────────────
const SB_URL      = 'sb_publishable_CvAdcZP99ZQ3iOZ4yODyEg_nQkF7x5q'; // ← REEMPLAZAR
const SB_ANON_KEY = 'sb_publishable_CvAdcZP99ZQ3iOZ4yODyEg_nQkF7x5q'; // ← REEMPLAZAR
const SB_TABLE    = 'state_blobs';
const SB_ROW_KEY  = 'castor_main';

let _sbClient = null;
let _sbReady   = false;

function _initSb() {
  try {
    const lib = (typeof globalThis !== 'undefined' && globalThis.supabase) || window.supabase;
    if (lib && typeof SB_URL === 'string' && SB_URL.startsWith('https://')) {
      _sbClient = lib.createClient(SB_URL, SB_ANON_KEY);
      _sbReady  = true;
      console.info('[Castor] ☁️  Supabase conectado →', SB_URL.slice(0, 40));
    } else {
      console.warn('[Castor] ⚠️  Supabase no activo — localStorage activo como fallback.');
    }
  } catch(e) { console.warn('[Castor] Supabase init error:', e.message); }
}

async function _sbPush(s) {
  if (!_sbReady || !_sbClient) return;
  try {
    const { error } = await _sbClient.from(SB_TABLE).upsert(
      { key: SB_ROW_KEY, data: s, updated_at: new Date().toISOString() },
      { onConflict: 'key' }
    );
    if (error) console.warn('[Castor] sbPush:', error.message);
  } catch(e) { console.warn('[Castor] sbPush ex:', e.message); }
}

async function _sbPull() {
  if (!_sbReady || !_sbClient) return null;
  try {
    const { data, error } = await _sbClient
      .from(SB_TABLE).select('data, updated_at')
      .eq('key', SB_ROW_KEY).single();
    if (error || !data) return null;
    return data;
  } catch(e) { console.warn('[Castor] sbPull ex:', e.message); return null; }
}

// ── Sync estructurado de journal_entries / journal_lines (Fase 2 Supabase) ──
// Convive con el blob sync (_sbPush) que sube todo el state. Este sync replica
// asientos individuales a las tablas relacionales para queries SQL y BI.
function _jeToRow(j) {
  return {
    id: j.id, date: j.date, source: j.source, source_id: j.sourceId || null,
    description: j.description || null, period_id: j.periodId || null,
    currency: j.currency || 'COP', status: j.status || 'posted',
    reverses: j.reverses || null, reversed_by: j.reversedBy || null,
    reversed_at: j.reversedAt || null, reversed_reason: j.reversedReason || null,
    total_debit: +j.totalDebit || 0, total_credit: +j.totalCredit || 0,
    created_at: j.createdAt || null, created_by: j.createdBy || null,
    posted_at: j.postedAt || null, posted_by: j.postedBy || null
  };
}
function _lineToRow(l) {
  return {
    id: l.id, journal_id: l.journalId, account_code: l.accountCode,
    debit: +l.debit || 0, credit: +l.credit || 0,
    third_party_type: l.thirdParty?.type || null,
    third_party_id: l.thirdParty?.id || null,
    third_party_name: l.thirdParty?.name || null,
    third_party_doc: l.thirdParty?.doc || null,
    cost_center: l.costCenter || null, description: l.description || null,
    source_link_module: l.sourceLink?.module || null,
    source_link_id: l.sourceLink?.id || null
  };
}
async function _sbPushDirtyJournals(s) {
  if (!_sbReady || !_sbClient) return;
  const dirty = s._dirtyJournals;
  if (!dirty || typeof dirty.has !== 'function' || !dirty.size) return;
  const ids = Array.from(dirty);
  const idSet = new Set(ids);
  const jeRows   = (s.journalEntries || []).filter(j => idSet.has(j.id)).map(_jeToRow);
  const lineRows = (s.journalLines   || []).filter(l => idSet.has(l.journalId)).map(_lineToRow);
  if (!jeRows.length) { dirty.clear(); return; }
  // Limpieza optimista; si la upsert falla, restauramos los IDs
  s._dirtyJournals = new Set();
  try {
    const r1 = await _sbClient.from('journal_entries').upsert(jeRows, { onConflict: 'id' });
    if (r1.error) throw r1.error;
    if (lineRows.length) {
      const r2 = await _sbClient.from('journal_lines').upsert(lineRows, { onConflict: 'id' });
      if (r2.error) throw r2.error;
    }
  } catch (e) {
    console.warn('[Castor] sbPushDirtyJournals:', e.message || e);
    ids.forEach(id => s._dirtyJournals.add(id));
  }
}

// ── Pull desde Supabase: lectura bajo demanda (Fase 3 Supabase) ─────────────
// Convierte una fila SQL al objeto JS local (inverso de _jeToRow / _lineToRow).
function _rowToJe(r) {
  return {
    id: r.id, date: r.date, source: r.source, sourceId: r.source_id || null,
    description: r.description || '', periodId: r.period_id || null,
    currency: r.currency || 'COP', status: r.status || 'posted',
    reverses: r.reverses || null, reversedBy: r.reversed_by || null,
    reversedAt: r.reversed_at || null, reversedReason: r.reversed_reason || null,
    totalDebit: +r.total_debit || 0, totalCredit: +r.total_credit || 0,
    createdAt: r.created_at || null, createdBy: r.created_by || null,
    postedAt: r.posted_at || null, postedBy: r.posted_by || null
  };
}
function _rowToLine(r) {
  const tp = (r.third_party_id || r.third_party_name) ? {
    type: r.third_party_type || null, id: r.third_party_id || null,
    name: r.third_party_name || null, doc: r.third_party_doc || null
  } : null;
  const sl = (r.source_link_module || r.source_link_id) ? {
    module: r.source_link_module || null, id: r.source_link_id || null
  } : null;
  return {
    id: r.id, journalId: r.journal_id, accountCode: r.account_code,
    debit: +r.debit || 0, credit: +r.credit || 0,
    thirdParty: tp, costCenter: r.cost_center || null,
    description: r.description || '', sourceLink: sl
  };
}

// Pull journals/lines desde Supabase y merge en state local (idempotente por id).
// - Agrega JEs nuevos al frente (más recientes primero, igual que postJournalEntry).
// - Actualiza JEs existentes con la versión cloud (status, reversed_by, etc.).
// - Solo agrega líneas nuevas; nunca borra o modifica las locales (append-only por JE).
// Devuelve { jeAdded, jeUpdated, lineAdded } o { error: '...' }.
async function _sbPullJournals(opts) {
  opts = opts || {};
  if (!_sbReady || !_sbClient) return { error: 'no_client' };
  const limit = +opts.limit || 500;
  let q1 = _sbClient.from('journal_entries').select('*')
    .order('date', { ascending: false }).order('id', { ascending: false }).limit(limit);
  if (opts.since) q1 = q1.gte('date', opts.since);
  const r1 = await q1;
  if (r1.error) return { error: r1.error.message || String(r1.error) };
  const jeRows = r1.data || [];
  if (!jeRows.length) return { jeAdded: 0, jeUpdated: 0, lineAdded: 0 };
  const jeIds = jeRows.map(r => r.id);
  // Supabase tiene un límite de tamaño en .in() — cortamos en chunks de 200
  const lineRows = [];
  for (let i = 0; i < jeIds.length; i += 200) {
    const chunk = jeIds.slice(i, i + 200);
    const r2 = await _sbClient.from('journal_lines').select('*').in('journal_id', chunk);
    if (r2.error) return { error: r2.error.message || String(r2.error) };
    if (r2.data) lineRows.push(...r2.data);
  }
  // Merge en state local
  state.journalEntries = state.journalEntries || [];
  state.journalLines   = state.journalLines   || [];
  const localJeById   = new Map(state.journalEntries.map(j => [j.id, j]));
  const localLineIds  = new Set(state.journalLines.map(l => l.id));
  let jeAdded = 0, jeUpdated = 0, lineAdded = 0;
  for (const r of jeRows) {
    const fresh = _rowToJe(r);
    const existing = localJeById.get(r.id);
    if (!existing) { state.journalEntries.unshift(fresh); jeAdded++; }
    else { Object.assign(existing, fresh); jeUpdated++; }
  }
  // lineNumber se deriva del orden en cloud (los ids tienen sufijo -L1, -L2, ...).
  for (const r of lineRows) {
    if (localLineIds.has(r.id)) continue;
    const fresh = _rowToLine(r);
    const m = String(r.id).match(/-L(\d+)$/);
    if (m) fresh.lineNumber = +m[1];
    state.journalLines.push(fresh);
    lineAdded++;
  }
  return { jeAdded, jeUpdated, lineAdded };
}

// Lee saldo de una cuenta auxiliar desde la vista v_account_balance.
async function _sbReadAccountBalance(code) {
  if (!_sbReady || !_sbClient) return { error: 'no_client' };
  const { data, error } = await _sbClient
    .from('v_account_balance').select('saldo').eq('code', code).maybeSingle();
  if (error) return { error: error.message || String(error) };
  return { saldo: +(data && data.saldo) || 0 };
}

// Handler global invocable desde la UI (botón "Sincronizar desde Supabase").
window.onRefreshFromSupabase = async function() {
  if (!_sbReady || !_sbClient) {
    if (typeof toast === 'function') toast('Supabase no conectado — revisa SB_URL y SB_ANON_KEY', 'warn');
    return;
  }
  if (typeof toast === 'function') toast('🔄 Sincronizando desde Supabase…', 'info');
  const r = await _sbPullJournals({ limit: 1000 });
  if (r.error) {
    if (typeof toast === 'function') toast('Error: ' + r.error, 'error');
    return;
  }
  const total = (r.jeAdded||0) + (r.jeUpdated||0) + (r.lineAdded||0);
  if (total === 0) {
    if (typeof toast === 'function') toast('Local ya está al día con la nube', 'ok');
    return;
  }
  // Persistir el merge y re-render
  if (typeof save === 'function') save();
  if (typeof renderPage === 'function') renderPage();
  if (typeof toast === 'function') {
    toast(`☁️ ${r.jeAdded||0} JE nuevos · ${r.jeUpdated||0} actualizados · ${r.lineAdded||0} líneas`, 'ok');
  }
};

// Sube el state de localStorage a Supabase la primera vez (una sola vez).
async function migrateLocalToCloud() {
  if (state._migratedToSb) return;
  const remote = await _sbPull();
  if (remote && remote.data) {
    // Ya hay datos en la nube — marcar migrado sin sobrescribir
    state._migratedToSb = true;
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
    return;
  }
  state._migratedToSb = true;
  await _sbPush(state);
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  console.info('[Castor] ☁️  State local subido a Supabase (migración inicial)');
}

// Descarga de Supabase si hay datos más recientes y re-renderiza.
async function syncFromCloud() {
  const remote = await _sbPull();
  if (!remote || !remote.data) return;
  const localTime  = state._savedAt  || '1970-01-01T00:00:00Z';
  const remoteTime = remote.updated_at || '1970-01-01T00:00:00Z';
  if (remoteTime > localTime) {
    state = remote.data;
    migrateLegacy();
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
    renderAll();
    toast('☁️ Datos sincronizados desde la nube', 'ok');
  }
}

function load() { try { const r=localStorage.getItem(STORAGE_KEY); return r?JSON.parse(r):null; } catch { return null; } }
function save() {
  state._savedAt = new Date().toISOString();
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) { console.error(e); }
  _sbPush(state);              // blob sync (state completo)
  _sbPushDirtyJournals(state); // sync estructurado de journal_entries/_lines
}
function resetData() { if(!confirm('¿Restablecer todos los datos de demostración?')) return; localStorage.removeItem(STORAGE_KEY); state=seed(); state._migratedToSb=false; migrateLegacy(); save(); renderAll(); toast('Datos restablecidos','ok'); }

function migrateLegacy() {
  if (state.migrationV6Done) return;
  const estadoMap = { 'nuevo':'Nuevo', 'contactado':'En gestión', 'cotizado':'En gestión', 'ganado':'Compro', 'perdido':'No interesado', 'en Gestión':'En gestión' };
  const channelMap = { 'Referido':'Llamada', 'Web':'Pagina Web', 'Showroom':'Tienda 43', 'Redes Sociales':'Instagram', 'Otro':'Llamada' };
  (state.leads||[]).forEach(l => {
    if (estadoMap[l.estado]) l.estado = estadoMap[l.estado];
    if (channelMap[l.channel]) l.channel = channelMap[l.channel];
    if (!l.tipo) l.tipo = l.company && l.company!=='—' ? 'institucional' : 'lead';
    if (l.tipo==='institucional' && !l.razonSocial) { l.razonSocial = l.company||l.name; l.nit = l.nit||''; l.contacto = l.contacto||l.name; }
    if (!l.productosInteres) l.productosInteres = [];
    if (!l.seguimientos) l.seguimientos = [];
  });
  (state.quotes||[]).forEach(q => {
    if (channelMap[q.channel]) q.channel = channelMap[q.channel];
    if (!q.channel) q.channel = 'Llamada';
    if (!q.vigenciaDias) q.vigenciaDias = 30;
  });
  (state.orders||[]).forEach(o => {
    if (!o.docType) o.docType = 'factura';
    if (!o.address) { const c = (state.customers||[]).find(x=>x.id===o.customerId); o.address = c?.address||''; }
    if (!o.deliveryAddress) o.deliveryAddress = o.address||'';
  });
  (state.customers||[]).forEach(c => {
    if (!c.tipo) c.tipo = 'persona';
    if (!c.notes) c.notes = [];
    if (!c.seguimientos) c.seguimientos = [];
    if (!c.linkedLeadId && c.fromLead) c.linkedLeadId = c.fromLead;
    if (!c.address) c.address = '';
    if (!c.deliveryAddress) c.deliveryAddress = c.address||'';
    // Fase 2 contable: campos para retenciones automáticas
    if (typeof c.retenedor === 'undefined') c.retenedor = false;
    if (!c.actividadRetencion) c.actividadRetencion = 'COMP';
    if (typeof c.practicaReteIVA === 'undefined') c.practicaReteIVA = false;
  });
  (state.payments||[]).forEach(p => {
    const methodMap = { 'transferencia':'Transferencia', 'efectivo':'Efectivo', 'tarjeta':'Tarjeta', 'cheque':'Transferencia', 'PSE':'Link de pago' };
    if (methodMap[p.method]) p.method = methodMap[p.method];
    if (typeof p.soporte === 'undefined') p.soporte = null;
  });
  (state.marketingAssets||[]).forEach(a => {
    const typeMap = { 'catálogo':'Catálogo', 'banner':'Feed', 'post':'Feed', 'video':'Historias', 'flyer':'Campañas', 'brochure':'Catálogo', 'email':'Campañas', 'valla':'Campañas', 'historia':'Historias', 'anuncio':'Campañas', 'presentación':'Campañas' };
    if (typeMap[a.type]) a.type = typeMap[a.type];
    if (!a.productIds) a.productIds = [];
    if (!a.filename) a.filename = (a.name||'archivo').toLowerCase().replace(/\s+/g,'_')+'.'+(a.format||'pdf').toLowerCase();
  });
  if (!state.notifications) state.notifications = [];
  if (!state.invoiceRequests) state.invoiceRequests = [];
  if (!state.dispatchRequests) state.dispatchRequests = [];
  state.migrationV6Done = true;

  // V7: separar pedido de OP. Cada order existente se vuelve una OP; se crea un Pedido que las agrupa por cliente+fecha+quoteId.
  if (!state.migrationV7Done) {
    if (!state.pedidos) state.pedidos = [];
    if (!state.counters.pedV7) state.counters.pedV7 = 1260;
    if (!state.counters.op)    state.counters.op = 5000;
    const groupKey = (o)=>`${o.customerId||o.clientName}|${o.orderDate||''}|${o.quoteId||''}`;
    const groups = {};
    (state.orders||[]).forEach(o => { const k=groupKey(o); (groups[k]=groups[k]||[]).push(o); });
    Object.values(groups).forEach(arr => {
      state.counters.pedV7++;
      const pedId = 'P-'+state.counters.pedV7;
      const first = arr[0];
      const pedido = {
        id: pedId,
        customerId: first.customerId, clientName: first.clientName,
        quoteId: first.quoteId||null, asesor: first.asesor,
        orderDate: first.orderDate||today(), tiempo: first.tiempo||30, dueDate: first.dueDate||today(),
        docType: first.docType||'factura',
        address: first.address||'', deliveryAddress: first.deliveryAddress||'',
        total: arr.reduce((a,o)=>a+(+o.total||0),0),
        paid: Math.round(arr.reduce((a,o)=>a+(+o.paid||0)*(+o.total||0),0) / (arr.reduce((a,o)=>a+(+o.total||0),0)||1)),
        tipo: arr.every(o=>o.tipo==='stock')?'stock':arr.some(o=>o.tipo==='innovacion')?'innovacion':'produccion',
        estado: 'activo',
        notes:[], seguimientos:[]
      };
      state.pedidos.push(pedido);
      arr.forEach(o => {
        o.pedidoId = pedId;
        if (/^PED-/i.test(o.id)) {
          state.counters.op++;
          o.id = 'OP-'+state.counters.op;
        }
      });
    });
    // Reapuntar pagos a pedidos
    (state.payments||[]).forEach(p => {
      if (p.pedidoId) return;
      const tgtOrderId = p.orderId || (p.orderIds||[])[0];
      const o = state.orders.find(x=>x.id===tgtOrderId) || state.orders.find(x=>String(x.id).replace(/^OP-/,'PED-')===tgtOrderId);
      if (o?.pedidoId) p.pedidoId = o.pedidoId;
    });
    (state.invoiceRequests||[]).forEach(r=>{ const o=state.orders.find(x=>x.id===r.orderId); if (o?.pedidoId && !r.pedidoId) r.pedidoId=o.pedidoId; });
    (state.dispatchRequests||[]).forEach(r=>{ const o=state.orders.find(x=>x.id===r.orderId); if (o?.pedidoId && !r.pedidoId) r.pedidoId=o.pedidoId; });
    state.migrationV7Done = true;
  }

  // V9 (Demo 3): marcar tipo de bodega (terminado/insumos) + crear Almacén#1/#2 si faltan
  if (!state.migrationV9Done) {
    (state.warehouses||[]).forEach(w => {
      if (!w.tipo) w.tipo = /Almac[eé]n/i.test(w.code||w.name||'') ? 'insumos' : 'terminado';
    });
    const hasAlm1 = (state.warehouses||[]).find(w=>w.code==='Almacen#1');
    if (!hasAlm1) state.warehouses.push({ id:'W-ALM1', code:'Insumos 1', name:'Insumos 1', address:'Bodega materia prima 1', responsable:'Mario Estrada', color:'#059669', tipo:'insumos' });
    const hasAlm2 = (state.warehouses||[]).find(w=>w.code==='Almacen#2');
    if (!hasAlm2) state.warehouses.push({ id:'W-ALM2', code:'Insumos 2', name:'Insumos 2', address:'Bodega materia prima 2', responsable:'Mario Estrada', color:'#0ea5e9', tipo:'insumos' });
    if (!state.purchaseOrders) state.purchaseOrders = [];
    if (!state.counters.oc) state.counters.oc = 3000;
    // Migrar unit/category antiguos a los nuevos valores
    const unitMap = { 'pieza':'Unidad','metro':'Mts','m²':'Mts','m³':'Unidad','kg':'Kg','litro':'Litro','unidad':'Unidad','galón':'Galon' };
    const catMap = { 'Textiles':'Telas','Metales':'Hierro','Pinturas':'Pintura','Herrajes':'Insumos','Relleno':'Espuma','Superficies':'Madera','Otro':'Insumos','Otros':'Insumos' };
    (state.supplies||[]).forEach(s => {
      if (unitMap[s.unit]) s.unit = unitMap[s.unit];
      if (!s.unitOut) s.unitOut = s.unit;
      if (!s.convFactor) s.convFactor = 1;
      if (catMap[s.category]) s.category = catMap[s.category];
      if (!s.warehouseId) s.warehouseId = 'W-ALM1';
    });
    (state.suppliers||[]).forEach(s => {
      if (catMap[s.category]) s.category = catMap[s.category];
      if (!s.pais) s.pais = 'Colombia';
      if (!s.address) s.address = '—';
      if (!s.actividadEconomica) s.actividadEconomica = '—';
    });
    state.migrationV9Done = true;
  }

  // V10 (Demo 4): renombrar Almacen#1/#2 → Insumos 1/2 y asegurar ambas bodegas de insumos existen
  if (!state.migrationV10Done) {
    let alm1 = (state.warehouses||[]).find(w=>w.id==='W-ALM1' || w.code==='Almacen#1' || w.code==='Insumos 1');
    if (!alm1) state.warehouses.push(alm1 = { id:'W-ALM1', code:'Insumos 1', name:'Insumos 1', address:'Bodega materia prima 1', responsable:'Mario Estrada', color:'#059669', tipo:'insumos' });
    else { alm1.id='W-ALM1'; alm1.code='Insumos 1'; alm1.name='Insumos 1'; alm1.tipo='insumos'; }
    let alm2 = (state.warehouses||[]).find(w=>w.id==='W-ALM2' || w.code==='Almacen#2' || w.code==='Insumos 2');
    if (!alm2) state.warehouses.push(alm2 = { id:'W-ALM2', code:'Insumos 2', name:'Insumos 2', address:'Bodega materia prima 2', responsable:'Mario Estrada', color:'#0ea5e9', tipo:'insumos' });
    else { alm2.id='W-ALM2'; alm2.code='Insumos 2'; alm2.name='Insumos 2'; alm2.tipo='insumos'; }
    // Migrar entryQty/outQty a partir de convFactor si faltan
    (state.supplies||[]).forEach(s => {
      if (s.entryQty==null) s.entryQty = 1;
      if (s.outQty==null)   s.outQty = +s.convFactor || 1;
    });
    // Asegurar área "Programación" al comienzo de la lista de áreas de producción de cada producto
    (state.products||[]).forEach(p => {
      if (!p.areas) p.areas = [];
      if (p.areas[0] !== 'Programación') p.areas = ['Programación', ...p.areas.filter(a=>a!=='Programación')];
    });
    state.migrationV10Done = true;
  }

  // V8: pagos salientes (proveedores/empleados)
  if (!state.migrationV8Done) {
    if (!state.outgoingPayments) state.outgoingPayments = [];
    if (!state.counters.pout) state.counters.pout = 100;
    if (state.outgoingPayments.length === 0) {
      const sup = state.suppliers||[];
      const emp = state.employees||[];
      const b   = (state.bankAccounts||[])[0]||{id:''};
      const seed = [
        { tipo:'proveedor', beneficiarioId: sup[0]?.id||'', beneficiario: sup[0]?.name||'Proveedor', concepto:'Pago factura insumos madera', amount: 8500000, method:'Transferencia', date:today(), reference:'FV-2024-118', bankId:b.id, estado:'confirmado' },
        { tipo:'proveedor', beneficiarioId: sup[1]?.id||'', beneficiario: sup[1]?.name||'Proveedor', concepto:'Anticipo telas',                amount: 4200000, method:'Transferencia', date:today(), reference:'FV-2024-132', bankId:b.id, estado:'confirmado' },
        { tipo:'empleado',  beneficiarioId: emp[0]?.id||'', beneficiario: emp[0]?.name||'Empleado',  concepto:'Nómina quincena abril',      amount: 2300000, method:'Transferencia', date:today(), reference:'NOM-04-A',    bankId:b.id, estado:'confirmado' },
        { tipo:'empleado',  beneficiarioId: emp[1]?.id||'', beneficiario: emp[1]?.name||'Empleado',  concepto:'Bonificación cierre pedido',  amount:  400000, method:'Efectivo',      date:today(), reference:'BON-001',     bankId:b.id, estado:'pendiente' },
        { tipo:'proveedor', beneficiarioId: sup[2]?.id||'', beneficiario: sup[2]?.name||'Proveedor', concepto:'Pintura electrostática',      amount: 1800000, method:'Transferencia', date:today(), reference:'FV-2024-140', bankId:b.id, estado:'pendiente' }
      ];
      seed.forEach(s=>{ state.counters.pout++; state.outgoingPayments.push({ id:'POUT-'+state.counters.pout, registeredBy:'Sistema', ...s }); });
    }
    state.migrationV8Done = true;
  }

  // Fase 1 contable: cuentas PUC, mapeos, tax rules, periodos, journal regenerado
  if (typeof migrateAccountingV1 === 'function') {
    try { migrateAccountingV1(); } catch(e) { console.warn('migrateAccountingV1 falló:', e); }
  }

  save();
}

function toast(msg, type='info') {
  const el = document.createElement('div');
  const colors = { ok:'bg-emerald-600', error:'bg-red-600', warn:'bg-amber-600', info:'bg-brand-navy' };
  el.className = `toast ${colors[type]||colors.info} text-white px-4 py-3 rounded-lg shadow-lg text-sm font-medium max-w-sm`;
  el.textContent = msg;
  $('#toast-root').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateY(20px)'; setTimeout(()=>el.remove(),300); }, 2800);
}

// Helper para invocar hooks contables del módulo PUC: si la función existe y
// lanza, captura el error, lo logea y muestra un toast amarillo. No bloquea
// la operación. Centraliza el patrón duplicado en saveSupplyReceipt,
// saveSupplyIssue, confirmOutgoingPayment, approvePayment, adjustBank,
// closeOpAndInvoice, cargarCostoGarantiaOp, auditoriaCrearProductoCEDI, etc.
function safeAccountingHook(fnName, ...args) {
  try {
    const fn = window[fnName];
    if (typeof fn === 'function') fn(...args);
  } catch (e) {
    console.warn('Hook contable falló:', e);
    toast('Asiento PUC no generado: ' + (e.message || e), 'warn');
  }
}

/* ---------- NOTIFICATIONS ---------- */
function pushNotification({type='info', text, targetUser=null, link=null, key=null}) {
  if (!state.notifications) state.notifications = [];
  if (key && state.notifications.some(n=>n.key===key)) return;
  state.notifications.unshift({ id:uid('N'), type, text, targetUser, link, key, createdAt:nowISO(), read:false });
  if (state.notifications.length > 50) state.notifications.length = 50;
  save();
}
function markNotificationRead(id) { const n = (state.notifications||[]).find(x=>x.id===id); if (n) { n.read = true; save(); renderNotifBadge(); } }
function markAllNotificationsRead() { (state.notifications||[]).forEach(n=>n.read=true); save(); renderNotifBadge(); renderNotifDropdown(); }
function getMyNotifications() {
  const me = state.currentUser?.name;
  return (state.notifications||[]).filter(n => !n.targetUser || n.targetUser===me);
}
function renderNotifBadge() {
  const el = $('#notif-count'); if (!el) return;
  const unread = getMyNotifications().filter(n=>!n.read).length;
  el.textContent = unread;
  el.style.display = unread>0 ? 'flex' : 'none';
}
function toggleNotifDropdown() {
  const dd = $('#notif-dropdown'); if (!dd) return;
  const visible = dd.classList.contains('hidden');
  if (visible) { renderNotifDropdown(); dd.classList.remove('hidden'); } else { dd.classList.add('hidden'); }
}
function renderNotifDropdown() {
  const dd = $('#notif-list'); if (!dd) return;
  const mine = getMyNotifications().slice(0,10);
  const iconFor = t => t==='warning'?'⚠️':t==='error'?'🚨':'ℹ️';
  dd.innerHTML = mine.length ? mine.map(n=>`
    <div class="px-3 py-2 border-b border-brand-border hover:bg-brand-navy/40 cursor-pointer ${n.read?'opacity-60':''}" onclick="markNotificationRead('${n.id}'); ${n.link?`go('${n.link}')`:''}">
      <div class="flex items-start gap-2">
        <span class="text-sm">${iconFor(n.type)}</span>
        <div class="flex-1 min-w-0">
          <div class="text-xs text-white ${n.read?'':'font-semibold'}">${escape(n.text)}</div>
          <div class="text-[10px] text-brand-muted mt-0.5">${fmtDateTime(n.createdAt)}</div>
        </div>
        ${!n.read?'<div class="w-2 h-2 bg-brand-gold rounded-full mt-1"></div>':''}
      </div>
    </div>`).join('') : '<div class="p-6 text-center text-xs text-brand-muted italic">Sin notificaciones</div>';
}

function checkFollowupNotifications() {
  const now = today();
  (state.followups||[]).forEach(f => {
    if (f.status!=='pendiente') return;
    const d = daysBetween(now, f.dueDate);
    if (d === 1 && !f.notified1d) {
      pushNotification({ type:'warning', text:`Seguimiento ${f.code} de ${f.clientName} vence mañana`, targetUser:f.asesor, link:'postventa', key:'fu1d-'+f.id });
      f.notified1d = true;
    }
    if (d <= 0 && !f.notifiedDue) {
      pushNotification({ type:'error', text:`Seguimiento ${f.code} de ${f.clientName} vencido`, targetUser:f.asesor, link:'postventa', key:'fuDue-'+f.id });
      f.notifiedDue = true;
    }
  });
  // Seguimientos automáticos de leads (los 6 programados al crearse el lead)
  (state.leads||[]).forEach(l => {
    (l.seguimientos||[]).forEach(s => {
      if (s.estado!=='programado' && s.estado!=='pendiente') return;
      const d = daysBetween(now, s.fechaProxima);
      if (d <= 0) {
        if (s.estado === 'programado') s.estado = 'pendiente';
        if (!s.notifiedDue) {
          pushNotification({ type:'warning', text:`🔔 Seguimiento #${s.n||''} pendiente · Lead ${l.id} ${l.name}`, targetUser:l.asesor, link:'leads', key:`leadSeg-${l.id}-${s.id}` });
          s.notifiedDue = true;
        }
      }
    });
  });
  // Insumos por debajo del stock mínimo
  const low = (state.supplies||[]).filter(s=>(s.stock||0)<=(s.min||0));
  if (low.length) {
    pushNotification({ type:'warning', text:`⚠ ${low.length} insumo(s) por debajo del mínimo: ${low.slice(0,3).map(s=>s.name).join(', ')}${low.length>3?'…':''}`, link:'almacen', key:`lowMin-daily-${today()}` });
  }
  save();
}

function checkPendingSalesNotifications() {
  (state.quotes||[]).forEach(q => {
    if (q.estado !== 'aceptada') return;
    const hasOrder = (state.orders||[]).some(o=>o.quoteId===q.id);
    if (!hasOrder) {
      pushNotification({ type:'warning', text:`Cliente ${q.clientName} pendiente por crear pedido (cotización ${q.id})`, targetUser:q.asesor, link:'cotizaciones', key:'pendOrder-'+q.id });
    }
  });
}

      if (it.id==='inventario') badge = `<span class="ml-auto text-[10px] bg-emerald-500/20 text-emerald-300 px-1.5 py-0.5 rounded font-semibold">${state.finishedStock.reduce((a,f)=>a+f.qty,0)}</span>`;
      if (it.id==='produccion') {
        const alertas = state.orders.filter(o => o.estado==='produccion' && o.dueDate && daysBetween(today(),o.dueDate)<=7).length;
        if (alertas) badge = `<span class="ml-auto text-[10px] bg-red-500 text-white px-1.5 py-0.5 rounded font-semibold">${alertas}</span>`;
      }
      if (it.id==='garantias' && state.warranties.filter(w=>w.estado!=='cerrada').length) {
        badge = `<span class="ml-auto text-[10px] bg-amber-500 text-white px-1.5 py-0.5 rounded font-semibold">${state.warranties.filter(w=>w.estado!=='cerrada').length}</span>`;

function toggleInvSelect(id, checked) {
  if (checked) invSelection.add(id); else invSelection.delete(id);
  renderPage();
}
function toggleSelectAllInv(chk, ids) {
  if (chk.checked) ids.forEach(id=>invSelection.add(id));
  else ids.forEach(id=>invSelection.delete(id));
  renderPage();
}

function solicitarDespachoDesdeInventario(finishedStockId) {
  const f = state.finishedStock.find(x=>x.id===finishedStockId); if (!f) return;
  if (!f.pedidoId && !f.orderId) { toast('Este ítem no tiene pedido/OP asociada','error'); return; }
  // Si tiene pedidoId, usar el flow estándar de pedido
  if (f.pedidoId) {
    const ped = (state.pedidos||[]).find(p=>p.id===f.pedidoId);
    if (ped && typeof solicitarDespachoPedido === 'function') {
      solicitarDespachoPedido(f.pedidoId);
      return;
    }
  }
  // Fallback: si solo tiene orderId, usar la versión por OP
  if (f.orderId && typeof solicitarDespachoOP === 'function') {
    solicitarDespachoOP(f.orderId);
    return;
  }
  // Si nada anterior aplica, registrar solicitud directa contra el ítem
  state.dispatchRequests = state.dispatchRequests || [];
  state.counters.dispatch = (state.counters.dispatch||0)+1;
  const dId = 'DSP-'+String(state.counters.dispatch).padStart(3,'0');
  state.dispatchRequests.unshift({
    id:dId, finishedStockId:f.id, pedidoId:f.pedidoId||null, orderId:f.orderId||null,
    customerId:f.customerId||null, clientName:f.clientName||'',
    estado:'solicitado', solicitedAt:nowISO(), solicitedBy: state.currentUser?.name||'—'
  });
  pushNotification({ type:'info', text:`Despacho solicitado desde inventario · ${f.clientName||''}`, link:'despacho', key:`disp_${dId}` });
  save(); renderAll(); toast('Solicitud de despacho enviada','ok');
}

function programarDespachoCliente(finishedStockId) {
  const f = state.finishedStock.find(x=>x.id===finishedStockId); if (!f) return;
  const p = state.products.find(x=>x.id===f.productId);
  const w = state.warehouses.find(x=>x.id===f.warehouseId);
  const fecha = prompt(`Programar despacho para ${f.clientName||'cliente'} (${p?.name||''}). Fecha (YYYY-MM-DD):`, addDays(today(),2));
  if (!fecha) return;
  state.dispatchRequests = state.dispatchRequests || [];
  state.counters.dispatch = (state.counters.dispatch||0)+1;
  state.dispatchRequests.unshift({
    id: 'DES-'+state.counters.dispatch,
    finishedStockId: f.id,
    pedidoId: f.pedidoId||null,
    orderId: f.orderId||null,
    customerId: f.customerId||null,
    clientName: f.clientName||'',
    productId: f.productId, qty: f.qty,
    fromWarehouseId: f.warehouseId,
    address: f.deliveryAddress||'',
    scheduledDate: fecha,
    estado: 'pendiente',
    createdBy: state.currentUser?.name||'—',
    createdAt: nowISO()
  });
  pushNotification({ type:'info', text:`Despacho programado: ${f.clientName||''} · ${p?.name||''} · ${fecha}`, link:'despacho', key:'disp-'+state.counters.dispatch });
  save(); renderAll(); toast(`Despacho programado para ${fecha}`,'ok');
}

function openBulkTrasladoForm() {
  if (invSelection.size===0) { toast('Selecciona al menos un ítem','error'); return; }

  const items = [...invSelection].map(id=>state.finishedStock.find(f=>f.id===id)).filter(Boolean);
  const html = `
    <form onsubmit="event.preventDefault(); saveBulkTraslado(this);" class="panel rounded-xl shadow-2xl w-full max-w-2xl p-6 max-h-[90vh] overflow-y-auto scrollbar-thin" style="background:#152943">
      <div class="flex items-center justify-between mb-5"><h2 class="text-lg font-bold gold-title">↔ Traslado masivo (${items.length} ítems)</h2><button type="button" onclick="closeModal('modal-bulk-tras')" class="text-brand-muted text-2xl">×</button></div>
      <div class="grid grid-cols-2 gap-3 mb-4">
        <div><label class="label">Bodega destino *</label><select name="toWarehouse" required class="input-field">${termWhs.map(w=>`<option value="${w.id}">${escape(w.code)}</option>`).join('')}</select></div>
        <div><label class="label">Fecha *</label><input name="date" type="date" required value="${today()}" class="input-field"></div>
        <div class="col-span-2"><label class="label">Motivo / notas</label><input name="notes" class="input-field" placeholder="Reorganización, venta, etc."></div>
      </div>
      <div class="panel-2 p-3 rounded mb-4 max-h-64 overflow-y-auto scrollbar-thin">
        <div class="text-xs font-semibold gold-title mb-2">Ítems a trasladar</div>
        ${items.map(f=>{ const p=state.products.find(x=>x.id===f.productId); const w=state.warehouses.find(x=>x.id===f.warehouseId); return `<div class="flex justify-between text-xs py-1 border-t border-brand-border"><span class="text-white">${escape(p?.name||'—')} ×${f.qty}</span><span class="text-brand-muted">desde ${escape(w?.code||'—')}</span></div>`; }).join('')}
      </div>
      <div class="flex justify-end gap-2"><button type="button" onclick="closeModal('modal-bulk-tras')" class="btn-outline">Cancelar</button><button type="submit" class="btn-gold">Trasladar todos</button></div>
    </form>`;
  showModal('modal-bulk-tras', html);
}

function saveBulkTraslado(form) {
  const fd = new FormData(form);
  const toW = fd.get('toWarehouse');
  const date = fd.get('date');
  const notes = fd.get('notes')||'';
  let count = 0;
  [...invSelection].forEach(id=>{
    const f = state.finishedStock.find(x=>x.id===id); if (!f) return;
    const from = f.warehouseId;
    f.warehouseId = toW;
    state.stockMoves = state.stockMoves || [];
    state.stockMoves.unshift({ id:uid('M'), type:'traslado', productId:f.productId, qty:f.qty, date, from, to:toW, reason:notes||`Traslado masivo`, by:state.currentUser?.name||'—', warehouseId:toW });
    count++;
  });
  invSelection.clear();
  save(); closeModal('modal-bulk-tras'); renderAll(); toast(`${count} traslado(s) registrado(s)`,'ok');
}

function saveTraslado(fsId, form) {
  const d = Object.fromEntries(new FormData(form).entries());
  const f = state.finishedStock.find(x=>x.id===fsId); if (!f) return;
  const qty = +d.qty; if (qty<=0 || qty>f.qty) { toast('Cantidad inválida','error'); return; }
  if (qty===f.qty) {
    f.warehouseId = d.destino;
  } else {
    f.qty -= qty;
    state.finishedStock.unshift({ ...f, id:uid('FS'), warehouseId:d.destino, qty });
  }
  state.counters.mov = (state.counters.mov||0)+1;
  state.stockMoves = state.stockMoves || [];
  state.stockMoves.push({ id:'SM-'+state.counters.mov, productId:f.productId, qty, type:'traslado', fromWarehouseId:f.warehouseId, toWarehouseId:d.destino, date:today(), reason:d.motivo||'Traslado' });
  save(); closeModal('modal-traslado'); closeSlidePanel(); renderAll(); toast('Traslado registrado','ok');
}

function despacharSolicitud(reqId) {
  const d = (state.dispatchRequests||[]).find(x=>x.id===reqId); if (!d) return;
  const orderIds = d.orderIds && d.orderIds.length ? d.orderIds : (d.orderId?[d.orderId]:[]);
  orderIds.forEach(id => {
    const o = state.orders.find(x=>x.id===id); if (!o) return;
    o.estado = 'despachado';
    o.deliveredAt = today();
    state.finishedStock.forEach(f => { if (f.orderId===id && f.status==='reservado') f.status = 'despachado'; });
  });
  d.estado = 'despachado';
  d.dispatchedAt = nowISO();
  d.dispatchedBy = state.currentUser?.name || 'Despacho';
  save(); renderPage(); toast(`Despacho ${d.id} realizado · postventa agendada`,'ok');
}

function markOrderDespachado(id) {
  const o = state.orders.find(x=>x.id===id); if (!o) return;
  o.estado = 'despachado';
  o.deliveredAt = today();
  state.finishedStock.forEach(f => { if (f.orderId===id && f.status==='reservado') f.status = 'despachado'; });
  (state.dispatchRequests||[]).filter(d=>((d.orderIds||[]).includes(id) || d.orderId===id) && d.estado==='pendiente').forEach(d=>{
    d.estado='despachado'; d.dispatchedAt=nowISO(); d.dispatchedBy=state.currentUser?.name||'Despacho';
  });
  save(); renderPage(); toast(`OP ${id} despachada`,'ok');
}

function markCEDIReceived(moveId) {
  const m = (state.stockMoves||[]).find(x=>x.id===moveId); if (!m) return;
  m.status = 'recibido';
  m.receivedAt = today();
  m.receivedBy = state.currentUser?.name || 'Encargado CEDI';
  // Mover el stock terminado a CEDI (crear o actualizar registro)
  const p = state.products.find(x=>x.id===m.productId);
  if (p) {
    state.counters.mov = (state.counters.mov||0)+1;
    state.finishedStock.unshift({ id:uid('FS'), productId:m.productId, orderId:m.orderId, warehouseId:'W-CEDI', qty:m.qty, status:'disponible', readyDate:today(), notes:`Recibido en CEDI desde venta stock ${m.orderId}` });
  }
  save(); renderPage(); toast('Recepción confirmada en CEDI','ok');
}

function exportPriceList() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const pw = doc.internal.pageSize.width;
  doc.setFillColor(15,31,51); doc.rect(0,0,pw,32,'F');
  doc.setTextColor(201,169,97).setFontSize(18).setFont(undefined,'bold');
  doc.text('CASTOR · CPHORA',15,15);
  doc.setFontSize(10).setFont(undefined,'normal').setTextColor(230,215,168);
  doc.text('Lista de Precios ' + fmtDate(today()), 15, 23);

  doc.setTextColor(0,0,0).setFontSize(9);
  let y = 45;
  state.products.forEach((p, i) => {
    if (y > 270) { doc.addPage(); y = 20; }
    doc.setFillColor(i%2?243:255, i%2?240:255, i%2?232:255);
    doc.rect(15, y-5, pw-30, 18, 'F');
    doc.setFont(undefined,'bold').setFontSize(10);
    doc.text(`${p.name}`, 18, y);
    doc.setFont(undefined,'normal').setFontSize(8).setTextColor(100,100,100);
    doc.text(`${p.sku} · ${p.category} · ${p.dimensions?`${p.dimensions.ancho}×${p.dimensions.alto}×${p.dimensions.profundidad}cm`:''}`, 18, y+5);
    doc.setTextColor(0,0,0).setFontSize(7);
    const desc = doc.splitTextToSize(p.description||'', pw-80);
    doc.text(desc.slice(0,2), 18, y+10);
    doc.setFont(undefined,'bold').setFontSize(11).setTextColor(201,169,97);
    doc.text(fmtCOP(p.price).replace(/\s/g,''), pw-18, y+3, {align:'right'});
    y += 22;
  });
  doc.save('Castor_Lista_Precios.pdf');
  toast('Lista de precios exportada', 'ok');
}

function filterReceiptOCList(q) {
  const ocOpen = (state.purchaseOrders||[]).filter(o=>o.estado==='abierta'||o.estado==='parcial');
  const dd = document.getElementById('srcp-oc-dd'); if (!dd) return;
  const qq = (q||'').toLowerCase().trim();
  const matches = ocOpen.filter(o => !qq || `${o.id} ${o.supplier||''}`.toLowerCase().includes(qq)).slice(0,20);
  dd.innerHTML = matches.length
    ? matches.map(o=>`<div onclick="pickReceiptOC('${o.id}')" class="px-3 py-2 text-xs hover:bg-brand-navy/40 cursor-pointer border-b border-brand-navy/30">
        <div class="flex justify-between items-center"><span class="font-mono text-brand-gold">${escape(o.id)}</span><span class="text-brand-gold-light">${fmtCOP(o.total)}</span></div>
        <div class="text-white">${escape(o.supplier||'—')}</div>
        <div class="text-brand-muted text-[10px]">${escape(o.estado)} · ${fmtDate(o.expectedDate)}</div>
      </div>`).join('')
    : '<div class="px-3 py-2 text-xs text-brand-muted italic">Sin OCs abiertas que coincidan</div>';
  dd.classList.remove('hidden');
}
function pickReceiptOC(ocId) {
  const oc = (state.purchaseOrders||[]).find(o=>o.id===ocId); if (!oc) return;
  const inp = document.getElementById('srcp-oc-search');
  const hid = document.getElementById('srcp-oc-id');
  const sel = document.getElementById('srcp-oc-selected');
  if (inp) inp.value = `${oc.id} · ${oc.supplier||''}`;
  if (hid) hid.value = oc.id;
  if (sel) sel.textContent = `✓ ${oc.id} — ${oc.supplier||''} (${fmtCOP(oc.total)})`;
  document.getElementById('srcp-oc-dd')?.classList.add('hidden');
  loadReceiptItemsForOC(oc);
}
function loadReceiptItemsForOC(oc) {
  const form = document.querySelector('#modal-srcp form') || document.querySelector('form'); if (!form) return;
  const supplierSel = form.querySelector('[name="supplierId"]');
  const whSel = form.querySelector('[name="warehouseId"]');
  const cont = document.getElementById('srcp-items'); if (!cont) return;
  if (supplierSel) supplierSel.value = oc.supplierId;
  if (whSel && oc.warehouseId) whSel.value = oc.warehouseId;
  cont.innerHTML = '';
  (oc.items||[]).forEach(it => {
    const ins = state.supplies.find(s=>s.id===it.supplyId);
    const pending = (it.qty||0) - (it.received||0);
    if (pending <= 0) return;
    const isTela = !!ins && /tela|textil/i.test(ins.category||'');
    const maxAllowed = isTela ? (pending + 10) : pending;
    const row = document.createElement('div');
    row.className = 'grid grid-cols-12 gap-2 panel p-2 rounded';
    row.innerHTML = `
      <div class="col-span-5">
        <div class="text-xs text-white">${escape(ins?.name||it.supplyId)} ${isTela?'<span class="badge-info text-[9px] px-1 rounded ml-1">tela · +10m permitidos</span>':''}</div>
        <div class="text-[10px] text-brand-muted">Pendiente ${pending} ${escape(it.unit||'')}${isTela?` · máx. ${maxAllowed} (10m de holgura)`:''}</div>
      </div>
      <input type="hidden" name="r_supply[]" value="${it.supplyId}">
      <input type="hidden" name="r_pending[]" value="${pending}">
      <input type="hidden" name="r_isTela[]" value="${isTela?'1':'0'}">
      <div class="col-span-3"><input name="r_qty[]" type="number" min="0" max="${maxAllowed}" value="${pending}" oninput="onReceiptQtyChange(this)" class="input-field text-xs"></div>
      <div class="col-span-2"><input name="r_unit[]" value="${escape(it.unit||'')}" class="input-field text-xs" readonly></div>
      <div class="col-span-2"><input name="r_cost[]" type="number" min="0" value="${it.cost||0}" class="input-field text-xs"></div>`;
    cont.appendChild(row);
  });
  if (!cont.children.length) cont.innerHTML = '<div class="text-xs text-emerald-300 italic">OC sin saldo pendiente.</div>';
}

function onReceiptQtyChange(inp) {
  const row = inp.closest('.grid');
  const pending = +row.querySelector('[name="r_pending[]"]').value || 0;

function saveSupplyReceipt(form) {
  const fd = new FormData(form);
  const photo = fd.get('photo');
  if (!photo) { toast('Debes adjuntar la foto de la remisión','error'); return; }
  const ocId = fd.get('purchaseOrderId');
  if (!ocId) { toast('Debes asociar a una Orden de Compra','error'); return; }
  const oc = (state.purchaseOrders||[]).find(o=>o.id===ocId);
  if (!oc) { toast('OC no encontrada','error'); return; }
  const sups = fd.getAll('r_supply[]');
  const qtys = fd.getAll('r_qty[]').map(n=>+n);
  const costs = fd.getAll('r_cost[]').map(n=>+n);
  const units = fd.getAll('r_unit[]');
  const items = [];
  for (let i=0;i<sups.length;i++) if (sups[i] && qtys[i]>0) items.push({ supplyId:sups[i], qty:qtys[i], cost:costs[i]||0, unit:units[i]||'' });
  if (!items.length) { toast('Agrega al menos un ítem con cantidad > 0','error'); return; }

  state.supplyReceipts = state.supplyReceipts || [];
  state.counters.rcp = (state.counters.rcp||0)+1;
  const id = 'REC-'+String(state.counters.rcp).padStart(3,'0');
  state.supplyReceipts.unshift({ id, purchaseOrderId:ocId, supplierId:fd.get('supplierId')||oc.supplierId, date:fd.get('date'), remision:fd.get('remision'), warehouseId:fd.get('warehouseId'), photo, items, registeredBy:state.currentUser?.name||'—' });

  // Sumar stock + actualizar último costo + actualizar saldos OC
  const costUpdates = [];
  const flexUpdates = [];
  items.forEach(it => {
    const ins = state.supplies.find(s=>s.id===it.supplyId);
    if (ins) {
      ins.stock = (ins.stock||0) + it.qty;
      if (it.cost > 0 && it.cost !== ins.cost) {
        const oldCost = ins.cost || 0;
        ins.cost = it.cost;                   // costo se actualiza con el último recibido
        ins.lastCostUpdate = today();
        ins.lastCostFromReceipt = id;
        costUpdates.push({ name: ins.name, old: oldCost, neu: it.cost });
      } else if (it.cost > 0) {
        ins.lastCostUpdate = today();
      }
    }
    const ocItem = (oc.items||[]).find(x=>x.supplyId===it.supplyId);
    if (ocItem) {
      const pendingBefore = (ocItem.qty||0) - (ocItem.received||0);
      const isTela = !!ins && /tela|textil/i.test(ins.category||'');
      // Si vino más de lo pendiente y es tela: ampliar la qty de la OC
      if (isTela && it.qty > pendingBefore) {
        const extra = it.qty - pendingBefore;
        ocItem.qty = (ocItem.qty||0) + extra;          // OC absorbe los metros extra
        ocItem.flexExtra = (ocItem.flexExtra||0) + extra;
        ocItem.flexExtraReceiptId = id;
        it.flexExtra = extra;                          // anotar en el item de la entrada
        flexUpdates.push({ name: ins?.name||it.supplyId, extra });
        // También actualizar el total de la OC
        oc.total = (oc.total||0) + extra * (it.cost || ocItem.cost || 0);
      }
      ocItem.received = (ocItem.received||0) + it.qty;
      ocItem.status = ocItem.received >= ocItem.qty ? 'completo' : (ocItem.received>0 ? 'parcial' : 'pendiente');
    }
  });
  if (flexUpdates.length) {
    pushNotification({ type:'info', text:`📏 OC ${oc.id} ampliada: ${flexUpdates.map(f=>`+${f.extra}m ${f.name}`).join(', ')}`, link:'almacen', key:`flex-${id}` });
  }
  if (costUpdates.length) {
    pushNotification({ type:'info', text:`💰 Costo actualizado en ${costUpdates.length} insumo(s) desde entrada ${id}`, link:'almacen', key:`costUpd-${id}` });
  }
  // Alerta si tras la entrada algún insumo aún queda bajo mínimo
  const stillLow = items.map(it=>state.supplies.find(s=>s.id===it.supplyId)).filter(s=>s && (s.stock||0)<=(s.min||0));
  if (stillLow.length) {
    pushNotification({ type:'warning', text:`⚠ ${stillLow.length} insumo(s) aún por debajo del mínimo después de la entrada ${id}`, link:'almacen', key:`lowStock-${id}` });
  }

  // Estado OC: cerrada si todo completo, parcial si hay algún avance, si se marcó closePartial → cerrada
  const closePartial = fd.get('closePartial') === 'on';
  const allComplete = (oc.items||[]).every(x => (x.received||0) >= x.qty);
  if (allComplete) oc.estado = 'cerrada';
  else if (closePartial) oc.estado = 'cerrada';
  else oc.estado = 'parcial';

  // Hook contable Fase 2 (#9) — compra de materia prima
  safeAccountingHook('postSupplyPurchase', state.supplyReceipts[0]);

  save(); closeModal('modal-srcp'); renderAll(); toast(`Entrada ${id} registrada · OC ${oc.estado}`,'ok');
}

function rebuildIssueBOM() {
  const opIds = [...document.querySelectorAll('input[name="issue_op[]"]:checked')].map(c=>c.value);
  const cont = document.getElementById('sissue-items'); if (!cont) return;
  cont.querySelectorAll('[data-auto="1"]').forEach(r=>r.remove());
  const bomAgg = {};
  opIds.forEach(id => {
    const o = state.orders.find(x=>x.id===id); if (!o) return;
    const p = state.products.find(x=>x.id===o.productId); if (!p || !p.bom) return;
    p.bom.forEach(b => {
      const key = b.supplyId;
      bomAgg[key] = (bomAgg[key]||0) + (b.qty * (o.qty||1));
    });
  });
  Object.entries(bomAgg).forEach(([supplyId, qty]) => {
    addSupplyIssueRow({ supplyId, qty, auto:true });

}

function saveSupplyIssue(form) {
  const fd = new FormData(form);
  const type = fd.get('type');
  const opIds = fd.getAll('issue_op[]');
  const sups = fd.getAll('i_supply[]');
  const qtys = fd.getAll('i_qty[]').map(n=>+n);
  const units = fd.getAll('i_unit[]');
  const items = [];
  for (let i=0;i<sups.length;i++) if (sups[i] && qtys[i]>0) items.push({ supplyId:sups[i], qty:qtys[i], unit:units[i]||'' });
  if (!items.length) { toast('Agrega al menos un ítem con cantidad > 0','error'); return; }
  if (type==='salida') {
    for (const it of items) { const ins=state.supplies.find(s=>s.id===it.supplyId); if (!ins || ins.stock<it.qty) { toast(`Stock insuficiente: ${ins?.name||it.supplyId}`,'error'); return; } }

  state.supplyIssues = state.supplyIssues || [];
  state.counters.iss = (state.counters.iss||0)+1;

}

function addOCRow() {
  const cont = document.getElementById('oc-items'); if (!cont) return;
  const row = document.createElement('div');
  row.className = 'grid grid-cols-12 gap-2 panel p-2 rounded items-center';
  row.innerHTML = `
    <div class="col-span-4">

        <option value="">— Insumo —</option>

      </select>
    </div>
    <div class="col-span-2"><input name="oc_qty[]" type="number" min="1" step="any" required placeholder="0" oninput="recalcOCTotals()" class="input-field text-xs"></div>
    <div class="col-span-1"><input name="oc_unit[]" class="input-field text-xs" readonly></div>
    <div class="col-span-2"><input name="oc_cost[]" type="number" min="0" required placeholder="0" oninput="recalcOCTotals()" class="input-field text-xs"></div>
    <div class="col-span-2 text-right text-xs text-brand-gold-light font-semibold oc-row-total">$0</div>
    <div class="col-span-1 flex items-center justify-end"><button type="button" onclick="this.closest('.grid').remove(); recalcOCTotals();" class="text-red-400 text-lg">×</button></div>`;

  recalcOCTotals();
}

function onOCRowSupplyChange(sel) {
  const opt = sel.selectedOptions[0]; if (!opt) return;
  const row = sel.closest('.grid');
  row.querySelector('[name="oc_unit[]"]').value = opt.dataset.unit||'';
  row.querySelector('[name="oc_cost[]"]').value = +opt.dataset.cost||0;
  recalcOCTotals();
}

function recalcOCTotals() {
  const cont = document.getElementById('oc-items'); if (!cont) return;
  let grand = 0;
  cont.querySelectorAll('.grid').forEach(r => {
    const qty = +r.querySelector('[name="oc_qty[]"]')?.value || 0;
    const cost = +r.querySelector('[name="oc_cost[]"]')?.value || 0;
    const sub = qty * cost;
    const cell = r.querySelector('.oc-row-total');
    if (cell) cell.textContent = sub > 0 ? fmtCOP(sub) : '$0';
    grand += sub;
  });
  const tot = document.getElementById('oc-grand-total');
  if (tot) tot.textContent = fmtCOP(grand);
}

function savePurchaseOrder(form) {
  const fd = new FormData(form);
  const sups = fd.getAll('oc_supply[]');
  const qtys = fd.getAll('oc_qty[]').map(n=>+n);
  const units = fd.getAll('oc_unit[]');
  const costs = fd.getAll('oc_cost[]').map(n=>+n);
  const items = [];
  for (let i=0;i<sups.length;i++) if (sups[i] && qtys[i]>0) items.push({ supplyId:sups[i], qty:qtys[i], unit:units[i]||'', cost:costs[i]||0, received:0, status:'pendiente' });
  if (!items.length) { toast('Agrega al menos un ítem','error'); return; }
  const supplier = state.suppliers.find(s=>s.id===fd.get('supplierId'));
  const total = items.reduce((a,it)=>a+it.qty*it.cost,0);
  state.purchaseOrders = state.purchaseOrders || [];
  state.counters.oc = (state.counters.oc||3000)+1;
  const id = 'OC-'+state.counters.oc;
  state.purchaseOrders.unshift({ id, supplierId:fd.get('supplierId'), supplier:supplier?.name||'—', date:fd.get('date'), expectedDate:fd.get('expectedDate'), warehouseId:fd.get('warehouseId'), notes:fd.get('notes')||'', estado:'abierta', total, items, createdBy:state.currentUser?.name||'—' });
  save(); closeModal('modal-oc'); renderAll(); toast(`OC ${id} creada · ${fmtCOP(total)}`,'ok');
}

    });
  }
  if (el('chart-cashflow')) {

      type:'line',

      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{grid:{color:'#2A4061'}},x:{grid:{display:false}}} }
    });
  }
  if (el('chart-banks')) {
    const labels = state.bankAccounts.map(b => `${b.bank} ${b.type}`);

    const colors = state.bankAccounts.map(b => b.color);
    charts.banks = new Chart(el('chart-banks'), {
      type:'bar',
      data:{ labels, datasets:[{data, backgroundColor:colors, borderRadius:6}] },
      options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{grid:{color:'#2A4061'}}, y:{grid:{display:false}} } }
    });
  }
  if (el('chart-warehouses')) {
    const labels = state.warehouses.map(w=>w.code);
    const data = state.warehouses.map(w => state.finishedStock.filter(f=>f.warehouseId===w.id).reduce((a,f)=>a+f.qty,0));

      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{color:'#B8C5D9'}}}, cutout:'60%' }
    });
  }
}

function filterOutgoingBenef(q) {
  const tipo = document.getElementById('pout-tipo')?.value||'proveedor';

  const list = tipo==='empleado' ? (state.employees||[]) : (state.suppliers||[]);
  const qq = (q||'').toLowerCase();
  const matches = list.filter(x => !qq || `${x.name||''} ${x.nit||''} ${x.doc||''} ${x.email||''}`.toLowerCase().includes(qq)).slice(0,15);
  dd.innerHTML = matches.length ? matches.map(x=>`<div onclick="pickOutgoingBenef('${x.id}','${escape(x.name||'')}')" class="px-3 py-1.5 text-xs hover:bg-brand-navy/40 cursor-pointer text-white">${escape(x.name||'—')} <span class="text-brand-muted">· ${escape(x.nit||x.doc||'')}</span></div>`).join('') : '<div class="px-3 py-2 text-xs text-brand-muted italic">Sin coincidencias</div>';

}

function saveOutgoingPayment(form) {
  const fd = new FormData(form);
  const d = Object.fromEntries(fd.entries());
  d.amount = +d.amount;
  if (!d.soporteFilename) { toast('Adjunta el soporte','error'); return; }
  if (!d.beneficiarioId) { toast('Selecciona un beneficiario del buscador','error'); return; }
  // Capturar retenciones a practicar (lista de ids)
  const retIds = fd.getAll('retenciones[]').filter(Boolean);
  const list = d.tipo==='empleado' ? (state.employees||[]) : (state.suppliers||[]);
  const bene = list.find(x=>x.id===d.beneficiarioId);
  const beneficiario = bene?.name || '—';
  state.outgoingPayments = state.outgoingPayments || [];
  state.counters.pout = (state.counters.pout||100)+1;
  const soporte = { filename: d.soporteFilename, uploadedAt: nowISO() };
  delete d.soporteFilename;
  delete d['retenciones[]'];
  state.outgoingPayments.unshift({
    id:'POUT-'+state.counters.pout,
    estado:'pendiente',
    registeredBy: state.currentUser?.name||'—',
    beneficiario, soporte,
    retencionesPracticadas: retIds.length ? retIds : null,
    ...d
  });
  save(); closeModal('modal-pout'); renderPage(); toast('Pago saliente registrado','ok');
}

function confirmOutgoingPayment(id) {
  const p = state.outgoingPayments.find(x=>x.id===id); if (!p) return;
  if (p.estado==='confirmado') return;
  p.estado = 'confirmado';
  p.confirmedAt = nowISO();
  const b = state.bankAccounts.find(x=>x.id===p.bankId);
  if (b) b.balance = Math.max(0, (b.balance||0) - (+p.amount||0));
  state.accountEntries.unshift({ id:uid('AE'), date:p.date||today(), concept:`${p.tipo==='empleado'?'Nómina':'Pago a proveedor'}: ${p.beneficiario} — ${p.concepto}${p.purchaseOrderId?` [OC ${p.purchaseOrderId}]`:''}`, type:'egreso', debit:0, credit:+p.amount||0 });
  safeAccountingHook('postSupplierPayment', p);
  save(); renderPage(); toast('Pago confirmado','ok');
}

function rejectOutgoingPayment(id) {
  const p = state.outgoingPayments.find(x=>x.id===id); if (!p) return;
  const motivo = prompt('Motivo del rechazo:'); if (!motivo) return;
  if (p.estado==='confirmado') {
    const b = state.bankAccounts.find(x=>x.id===p.bankId);
    if (b) b.balance = (b.balance||0) + (+p.amount||0);
  }
  p.estado = 'rechazada';
  p.rejectedAt = nowISO();
  p.rejectedBy = state.currentUser?.name || '—';
  p.rejectedReason = motivo;
  save(); renderPage(); toast('Pago rechazado','warn');
}

function setPendingOutgoingPayment(id) {
  const p = state.outgoingPayments.find(x=>x.id===id); if (!p) return;
  if (p.estado==='confirmado') {
    const b = state.bankAccounts.find(x=>x.id===p.bankId);
    if (b) b.balance = (b.balance||0) + (+p.amount||0);
  }
  p.estado = 'pendiente';
  delete p.confirmedAt; delete p.rejectedAt; delete p.rejectedReason;
  save(); renderPage(); toast('Pago vuelto a pendiente','info');
}

function voidOutgoingPayment(id) {
  const p = state.outgoingPayments.find(x=>x.id===id); if (!p) return;
  if (!confirm('¿Anular este pago?')) return;
  if (p.estado==='confirmado') {
    const b = state.bankAccounts.find(x=>x.id===p.bankId);

}

function savePayment(form) {

  const soporte = { filename: d.soporteFilename, uploadedAt: nowISO() };
  delete d.soporteFilename;
  state.payments.unshift({ id:'PAG-'+state.counters.pag, estado:'pendiente', registeredBy: state.currentUser?.name || '—', pedidoId: d.pedidoId, orderIds, soporte, ...d });
  save(); closeModal('modal-pago'); renderAll(); toast('Pago registrado (pendiente aprobación Tesorería)','ok');
}

function approvePayment(payId) {
  const p = state.payments.find(x=>x.id===payId); if (!p) return;
  if (p.estado==='confirmado') { toast('Ya estaba aprobado','info'); return; }
  p.estado = 'confirmado';
  p.approvedAt = today();
  p.approvedBy = state.currentUser?.name || 'Tesorería';
  // Acreditar banco
  const b = state.bankAccounts.find(x=>x.id===p.bankId);
  if (b) b.balance += p.amount;
  // Resolver pedido
  const ped = p.pedidoId ? (state.pedidos||[]).find(x=>x.id===p.pedidoId) : null;
  const ids = p.orderIds || (p.orderId?[p.orderId]:[]);
  const orders = ids.map(id=>state.orders.find(o=>o.id===id)).filter(Boolean);
  // Acumular % del pedido
  if (ped) {
    const confirmados = state.payments.filter(x=>x.estado==='confirmado' && x.pedidoId===ped.id);
    const sumPag = confirmados.reduce((a,x)=>a+(+x.amount||0),0);
    ped.paid = ped.total ? Math.min(100, Math.round(sumPag/ped.total*100)) : 0;
    orders.forEach(o => { o.paid = ped.paid; if (o.paid>=60 && o.estado==='pendiente_pago') o.estado='produccion'; });
  } else {
    // Compat: distribución proporcional
    const totalSum = orders.reduce((a,o)=>a+(o.total||0),0);
    orders.forEach(o => {
      const allocated = totalSum ? p.amount * (o.total/totalSum) : (p.amount/orders.length);
      const prevPaid = state.payments.filter(x=>x.estado==='confirmado' && (x.orderIds||[x.orderId]).includes(o.id) && x.id!==p.id).reduce((a,x)=>{ const t=x.orderIds||[x.orderId]; const ot = t.map(id=>state.orders.find(y=>y.id===id)?.total||0).reduce((s,v)=>s+v,0); return a + (ot? x.amount*(o.total/ot):0); },0);
      const totalPaid = prevPaid + allocated;
      o.paid = Math.min(100, Math.round(totalPaid/(o.total||1)*100));
      if (o.paid>=60 && o.estado==='pendiente_pago') o.estado='produccion';
    });
  }
  // Libro contable
  const concepto = ped ? `Pago ${ped.id} → ${b?.bank}` : `Pago ${ids.join(',')} → ${b?.bank}`;
  state.accountEntries.unshift({ id:uid('AE'), date:today(), concept:concepto, debit:p.amount, credit:0, type:'ingreso' });
  safeAccountingHook('postCustomerCollection', p);

function rejectPayment(payId) {
  const p = state.payments.find(x=>x.id===payId); if (!p) return;

  p.rejectedAt = today();
  p.rejectedBy = state.currentUser?.name || 'Tesorería';
  save(); renderPage(); toast('Pago rechazado','error');
}

function adjustBank(id, form) {
  const d = Object.fromEntries(new FormData(form).entries());
  const delta = +d.delta;
  const b = state.bankAccounts.find(x=>x.id===id);
  b.balance += delta;
  state.accountEntries.unshift({ id:uid('AE'), date:today(), concept:`${d.concept} (${b.bank})`, debit:delta>0?delta:0, credit:delta<0?-delta:0, type:delta>0?'ingreso':'egreso' });
  safeAccountingHook('postBankAdjustment', { bankId:id, delta, concept:d.concept });
  save(); closeModal('modal-bank-adj'); renderAll(); toast('Saldo ajustado','ok');
}

function leadProductoRowHTML(it, idx) {
  const sel = it.productId ? state.products.find(p=>p.id===it.productId) : null;
  return `<div class="flex gap-2 items-center" data-lead-prow>
    <div class="flex-1 relative">
      <input type="text" class="input-field py-1 text-xs lp-search" placeholder="Buscar producto por nombre..." value="${escape(sel?.name||'')}" oninput="filterLeadProductoList(this)" onfocus="filterLeadProductoList(this)" onblur="setTimeout(()=>this.nextElementSibling?.classList.add('hidden'),180)">
      <input type="hidden" class="lp-product-id" value="${escape(sel?.id||'')}">
      <div class="lp-dropdown hidden absolute left-0 right-0 top-full mt-1 max-h-48 overflow-y-auto scrollbar-thin panel z-50"></div>
    </div>
    <input name="lp_qty_${idx}" type="number" min="1" value="${it.qty||1}" oninput="recalcLeadValor()" class="input-field w-20 py-1 text-xs">
    <button type="button" onclick="this.parentNode.remove(); recalcLeadValor();" class="text-brand-muted hover:text-red-400">×</button>
  </div>`;
}
function filterLeadProductoList(inp) {
  const q = inp.value.toLowerCase().trim();
  const dd = inp.parentElement.querySelector('.lp-dropdown');
  const matches = state.products.filter(p => isProductActiveForSale(p) && (!q || `${p.name} ${p.sku||''} ${p.category||''}`.toLowerCase().includes(q))).slice(0,20);
  dd.innerHTML = matches.map(p=>`<div onclick="pickLeadProducto(this,'${p.id}')" class="px-3 py-1.5 text-xs hover:bg-brand-navy/40 cursor-pointer flex items-center gap-2"><span class="text-white">${escape(p.name)}</span> <span class="text-brand-muted">· ${fmtCOP(p.price)}</span></div>`).join('') || '<div class="px-3 py-2 text-xs text-brand-muted italic">Sin resultados</div>';
  dd.classList.remove('hidden');
}
function pickLeadProducto(el, productId) {
  const wrap = el.closest('[data-lead-prow]');
  const p = state.products.find(x=>x.id===productId); if (!p) return;
  wrap.querySelector('.lp-search').value = p.name;
  wrap.querySelector('.lp-product-id').value = productId;
  wrap.querySelector('.lp-dropdown').classList.add('hidden');
  recalcLeadValor();
}
function addLeadProductoRow() {
  const wrap = document.getElementById('lead-productos-rows');
  const idx = wrap.querySelectorAll('[data-lead-prow]').length;
  wrap.insertAdjacentHTML('beforeend', leadProductoRowHTML({}, idx));
}
function recalcLeadValor() {
  const rows = document.querySelectorAll('#lead-productos-rows [data-lead-prow]');
  let total = 0;
  rows.forEach(r=>{
    const pid = r.querySelector('.lp-product-id')?.value || r.querySelector('select')?.value;
    const qty = +r.querySelector('input[type=number]').value || 0;
    const p = state.products.find(pp=>pp.id===pid);
    if (p) total += p.price * qty;
  });
  const el = document.getElementById('lead-valor');
  if (el) el.value = total;
}
function toggleLeadInst(show) {
  const el = document.getElementById('lead-inst-fields');

function generateLeadSeguimientos(baseDate, asesor) {
  // 6 seguimientos en los siguientes 2 meses (~cada 10 días)
  const offsets = [7, 17, 28, 40, 52, 60];
  const tipos = ['llamada','whatsapp','llamada','whatsapp','correo','visita'];
  return offsets.map((d,i)=>({
    id: uid('SEG'),
    n: i+1,
    at: nowISO(),
    by: asesor || 'Sistema',
    tipo: tipos[i] || 'llamada',
    fechaProxima: addDays(baseDate, d),
    texto: `Seguimiento programado #${i+1} (auto)`,
    estado: 'programado',
    auto: true
  }));
}

function saveLead(form, editId) {
  const fd = new FormData(form);
  const d = Object.fromEntries(fd.entries());
  const productos = [];
  form.querySelectorAll('#lead-productos-rows [data-lead-prow]').forEach(r=>{
    const pid = r.querySelector('.lp-product-id')?.value || r.querySelector('select')?.value;
    const qty = +r.querySelector('input[type=number]').value || 0;
    if (pid && qty>0) productos.push({ productId:pid, qty });
  });
  d.productosInteres = productos;
  d.valor = leadValorFromProductos(productos);
  if (d.tipo !== 'institucional') { d.razonSocial=''; d.nit=''; d.contacto=''; }
  if (editId) { Object.assign(state.leads.find(l=>l.id===editId), d); toast('Lead actualizado','ok'); }
  else {
    state.counters.lead++;
    const seguimientos = generateLeadSeguimientos(today(), d.asesor);
    state.leads.unshift({ id:'L-'+state.counters.lead, ...d, createdAt:today(), notes:[], seguimientos });
    toast('Lead creado · 6 seguimientos programados a 2 meses','ok');
  }
  save(); closeModal('modal-lead'); renderAll();
}

function customerTotalHist(cid) {
  return state.orders.filter(o=>o.customerId===cid).reduce((a,o)=>a+(+o.total||0),0);
}
function customerAsesor(c) {
  if (c.asesor) return c.asesor;
  const o = state.orders.find(x=>x.customerId===c.id); if (o?.asesor) return o.asesor;
  const q = state.quotes.find(x=>x.customerId===c.id); if (q?.asesor) return q.asesor;
  return '—';
}
function customerLastInteraction(cid) {
  const dates = [];
  state.orders.filter(o=>o.customerId===cid).forEach(o=>dates.push(o.orderDate||o.createdAt));
  state.quotes.filter(q=>q.customerId===cid).forEach(q=>dates.push(q.createdAt));
  state.payments.filter(p=>{ const o=state.orders.find(x=>x.id===p.orderId); return o?.customerId===cid; }).forEach(p=>dates.push(p.date));
  return dates.filter(Boolean).sort().pop() || '—';
}
function customerProcesosActivos(cid) {
  const leads = state.leads.filter(l=>l.linkedCustomerId===cid && l.estado!=='ganado' && l.estado!=='No interesado').length;
  const quotes = state.quotes.filter(q=>q.customerId===cid && !['aceptada','rechazada'].includes(q.estado)).length;
  const orders = state.orders.filter(o=>o.customerId===cid && !['entregado','cancelado'].includes(o.estado)).length;
  const follows = (state.followups||[]).filter(f=>f.customerId===cid && f.status==='pendiente').length;
  return leads+quotes+orders+follows;
}

function openCustomerProfile(customerId) {
  const c = state.customers.find(x=>x.id===customerId);
  if (!c) { toast('Cliente no encontrado','error'); return; }
  const leads = state.leads.filter(l => l.linkedCustomerId===c.id || (l.phone && l.phone===c.phone) || (l.email && c.email && l.email===c.email));
  const quotes = state.quotes.filter(q => q.customerId===c.id);
  const orders = state.orders.filter(o => o.customerId===c.id);
  const payments = state.payments.filter(p => orders.some(o=>o.id===p.orderId));
  const followups = (state.followups||[]).filter(f => f.customerId===c.id);
  const notes = c.notes || [];
  const segs = c.seguimientos || [];

function addCustomerNote(customerId) {
  const c = state.customers.find(x=>x.id===customerId); if (!c) return;
  const text = prompt('Nota sobre el cliente:'); if (!text) return;
  c.notes = c.notes || [];
  c.notes.push({ at: today(), by: state.currentUser?.name || '—', text });
  save(); openCustomerProfile(customerId); toast('Nota agregada','ok');
}

function quoteTotal(q) { const s = q.items.reduce((a,i)=>a+i.qty*i.price,0); return Math.round(s*(1-(q.discount||0)/100)); }

let _leadSearchField = 'name';
function setLeadSearchField(btn, field) {
  _leadSearchField = field;
  window._leadSearchField = field;
  document.querySelectorAll('[data-searchfield]').forEach(b=>{
    if (b.dataset.searchfield===field) { b.className='px-3 py-1 rounded bg-brand-gold text-brand-navy font-semibold'; }
    else { b.className='px-3 py-1 rounded panel-2 text-brand-muted'; }
  });
  const inp = document.getElementById('qf-lead-search');
  inp.placeholder = field==='name' ? 'Escribe nombre del lead…' : field==='phone' ? 'Escribe celular…' : field==='email' ? 'Escribe correo…' : 'Escribe documento…';
  filterLeadResults();
}
function filterLeadResults() {
  const q = (document.getElementById('qf-lead-search')?.value||'').toLowerCase().trim();
  const field = window._leadSearchField || 'name';
  const cont = document.getElementById('qf-lead-results');
  if (!cont) return;
  let results = state.leads;
  if (q) results = state.leads.filter(l => String(l[field]||'').toLowerCase().includes(q));
  results = results.slice(0,10);
  cont.innerHTML = results.length
    ? results.map(l => `<button type="button" onclick="applyLeadSelection('${l.id}')" class="w-full text-left panel-2 hover:bg-brand-navy/30 p-2 rounded text-xs flex justify-between">
        <span><span class="text-brand-gold font-mono">${l.id}</span> · <span class="text-white">${escape(l.name)}</span></span>
        <span class="text-brand-muted">${field==='phone'?escape(l.phone):field==='email'?escape(l.email):field==='doc'?escape(l.doc||''):escape(l.city||'')}</span>
      </button>`).join('')
    : '<div class="text-xs text-brand-muted italic p-2 text-center">Sin coincidencias</div>';
}
function applyLeadSelection(id) {
  const l = state.leads.find(x=>x.id===id); if (!l) return;
  document.getElementById('qf-leadid').value = l.id;
  document.getElementById('qf-client').value = l.name;
  document.getElementById('qf-city').value = l.city||'';
  const sel = document.getElementById('qf-lead-selected');
  document.getElementById('qf-sel-name').textContent = `${l.id} · ${l.name}`;
  document.getElementById('qf-sel-sub').textContent = `📱 ${l.phone||'—'} · ✉ ${l.email||'—'} · 🪪 ${l.doc||'—'} · ${l.city||'—'}`;
  sel.classList.remove('hidden');
  const nlb = document.getElementById('qf-new-lead-box');
  if (nlb) nlb.classList.add('hidden');
  if (l.channel) { const chSel = document.getElementById('qf-channel'); if (chSel) chSel.value = l.channel; }
  // Arrastrar el asesor del lead a la cotización
  if (l.asesor) { const asSel = document.getElementById('qf-asesor'); if (asSel) asSel.value = l.asesor; }
  // Arrastrar productos de interés del lead a los ítems de la cotización
  const itemsBox = document.getElementById('quote-items');
  if (itemsBox && (l.productosInteres||[]).length) {
    itemsBox.innerHTML = '';
    l.productosInteres.forEach(it => {
      addQuoteItemRow();
      const last = itemsBox.lastElementChild;
      const prodSel = last.querySelector('select[name="item_product[]"]');
      if (prodSel) { prodSel.value = it.productId; onQuoteProductChange(prodSel); }
      const qtyInp = last.querySelector('input[name="item_qty[]"]');
      if (qtyInp) qtyInp.value = it.qty||1;
    });
    recalcQuote();
    toast(`${l.productosInteres.length} producto(s) arrastrado(s) del lead`,'ok');
  }
}
function clearLeadSelection() {
  document.getElementById('qf-leadid').value = '';
  document.getElementById('qf-client').value = '';
  document.getElementById('qf-city').value = '';
  document.getElementById('qf-lead-selected').classList.add('hidden');
  const nlb = document.getElementById('qf-new-lead-box');
  if (nlb) nlb.classList.remove('hidden');
}

function addQuoteItemRow() {
  const row = document.createElement('div');
  row.className = 'grid grid-cols-12 gap-2 items-start';
  row.innerHTML = `
    <select name="item_product[]" onchange="onQuoteProductChange(this)" class="input-field col-span-4 text-xs">
      <option value="">— Producto —</option>
      ${state.products.map(p=>`<option value="${p.id}" data-price="${p.price}" data-name="${escape(p.name)}">${escape(p.name)} — ${fmtCOP(p.price)}</option>`).join('')}
    </select>
    <input name="item_desc[]" placeholder="Descripción" class="input-field col-span-4 text-xs">
    <input name="item_qty[]" type="number" min="1" value="1" oninput="recalcQuote()" class="input-field col-span-1 text-xs">
    <input name="item_price[]" type="number" readonly title="Precio desde lista (no editable)" value="0" class="input-field col-span-2 text-xs bg-brand-navy/40 cursor-not-allowed">
    <button type="button" onclick="this.parentElement.remove(); recalcQuote();" class="col-span-1 text-red-400 text-lg">×</button>`;
